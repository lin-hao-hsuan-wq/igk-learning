<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IGK Kids Academy Cloud Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Chilanka&family=Kosugi+Maru&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #55acee; 
            --success-color: #77dd77; 
            --error-color: #ff6961;   
            --bg-color: #fff9e6;      
            --border-style: 4px dashed #ffb347; 
            --font-en: 'Chilanka', cursive;
            --font-ja: 'Kosugi Maru', sans-serif;
        }
        
        /* 嚴格鎖定全螢幕，禁止任何網頁捲動 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        body {
            font-family: var(--font-en), var(--font-ja), cursive, sans-serif;
            background-color: var(--bg-color);
            color: #555;
            background-image: radial-gradient(#ffb347 1px, transparent 1px), radial-gradient(#ffb347 1px, #fff9e6 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
        }
        
        /* 外框高度完美限制在螢幕可視範圍內 (vh) */
        .main-wrapper {
            width: 100%;
            max-width: 800px;
            height: 94vh; 
            max-height: 680px; /* 降低上限，確保筆電螢幕能完全裝下 */
            border: var(--border-style);
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        
        /* 壓縮標題體積與間距 */
        h1.title {
            text-align: center;
            color: #ff6961;
            font-size: 2.5rem;
            margin-top: 0px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1);
            position: relative;
            display: inline-block;
            align-self: center;
        }
        h1.title::before, h1.title::after { content: "✨"; font-size: 1.5rem; position: absolute; }
        h1.title::before { left: -30px; top: -2px; }
        h1.title::after { right: -30px; bottom: -2px; }

        .nav-buttons { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
        button {
            padding: 10px 25px; font-size: 1.1rem; font-family: var(--font-en), var(--font-ja);
            border: none; border-radius: 50px; cursor: pointer; transition: all 0.2s ease;
            color: white; font-weight: bold; box-shadow: 0 4px 0 rgba(0,0,0,0.2); text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
        }
        button:hover { transform: translateY(1px); box-shadow: 0 3px 0 rgba(0,0,0,0.2); }
        button:active { transform: translateY(4px); box-shadow: none; }
        
        .btn-blue { background-color: #55acee; }
        .btn-green { background-color: #77dd77; }
        .btn-red { background-color: #ff6961; }
        .btn-gray { background-color: #95a5a6; }
        .btn-dark { background-color: #34495e; }
        .btn-orange { background-color: #ffb347; }
        
        .screen { 
            display: none; 
            text-align: center;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }
        .screen.active { display: flex; }
        hr { width: 100%; border: none; border-top: 4px dotted #ffb347; margin: 10px 0; }
        
        /* 題目框適度縮小，避免擠壓 */
        .question-box {
            font-size: 2.5rem; color: #ffb347; background: #fff8f8; border: 4px solid #55acee;
            padding: 12px 35px; border-radius: 20px; margin: 15px 0; display: inline-block; box-shadow: 0 4px 0 #55acee;
        }
        
        .input-area { width: 100%; margin-bottom: 10px; }
        .input-area select { font-size: 1.3rem; font-family: var(--font-en), var(--font-ja); padding: 10px; width: 85%; max-width: 320px; text-align: center; border: 4px solid #55acee; border-radius: 20px; outline: none; background-color: white; cursor: pointer; }
        .input-area input { font-size: 1.3rem; font-family: var(--font-en); padding: 10px; width: 85%; max-width: 320px; text-align: center; border: 4px solid #f99f9f; border-radius: 20px; outline: none; }
        
        /* 名字二次確認彈窗優化：確保不被任何東西擋住 */
        .ready-popup { display: none; background: #fffdf0; border: 4px solid #ffb347; border-radius: 25px; padding: 20px; margin: 5px auto; width: 85%; max-width: 360px; box-shadow: 0 4px 0 rgba(0,0,0,0.05); }
        .ready-text { font-size: 1.5rem; color: #ff6961; font-weight: bold; margin-bottom: 15px; line-height: 1.4; }

        .feedback-circle { width: 70px; height: 70px; border: 10px solid var(--success-color); border-radius: 50%; margin: 10px auto; display: none; }
        .wrong-hint { color: var(--error-color); font-size: 1.1rem; font-weight: bold; margin: 5px 0; background: #fff0f0; padding: 8px; border-radius: 10px; }
        
        /* 老師後台專屬內部微滾動，防止撐爆主畫面 */
        #admin-screen { overflow-y: auto; justify-content: flex-start; padding-right: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background-color: white; border-radius: 10px; overflow: hidden; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 0.95rem; }
        th { background-color: #f2f2f2; }
        
        .chart-container { position: relative; margin: 10px auto; height: 260px; width: 100%; background: white; padding: 10px; border-radius: 20px; border: 3px dashed #ffb347; box-sizing: border-box; }
        .score-display { font-size: 1.2rem; color: #7f8c8d; }
        .comment-display { font-size: 1.3rem; font-weight: bold; color: var(--primary-color); margin: 10px 0; padding: 12px; background: #e8f4f8; border-radius: 15px; border: 3px solid var(--primary-color); line-height: 1.4; }
        
        .review-box {
            margin-top: 10px; text-align: left; background: #fff; padding: 12px; border-radius: 20px; border: 3px dashed var(--error-color); width: 100%; box-sizing: border-box; max-height: 130px; overflow-y: auto;
        }
        .review-title { color: var(--error-color); font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; text-align: center; }
        .review-item { font-size: 1rem; padding: 5px 0; border-bottom: 1px dotted #ccc; display: flex; justify-content: space-between; }

        .teacher-floating-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: #34495e;
            box-shadow: 0 4px 0 #1a252f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            border: none;
            z-index: 1000;
            transition: all 0.2s ease;
        }
        .teacher-floating-btn:hover { transform: translateY(1px); box-shadow: 0 3px 0 #1a252f; background-color: #2c3e50; }
        .teacher-floating-btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

<button class="teacher-floating-btn" onclick="loginAdmin()" title="せんせい (Teacher)">👨‍🏫</button>

<div class="main-wrapper">
    <h1 class="title">IGK</h1>

    <div id="main-nav" class="nav-buttons" style="display: flex;">
        <button class="btn-green" style="font-size: 1.4rem; padding: 12px 40px;" onclick="startExamFlow()">テスト (Exam)</button>
    </div>

    <hr id="main-hr">

    <div id="name-input-screen" class="screen">
        <h3 id="name-title-text">なまえをえらんでね (Choose Your Name)</h3>
        <div class="input-area">
            <div id="select-container-box">
                <select id="student-name-select" onchange="handleNameSelection(this.value)">
                    <option value="">-- Click Here to Choose Name --</option>
                    <option value="Soma">Soma</option>
                    <option value="Kosei">Kosei</option>
                    <option value="Minato">Minato</option>
                    <option value="Sumire">Sumire</option>
                    <option value="Kanata">Kanata</option>
                    <option value="Tamaki">Tamaki</option>
                    <option value="Ayata">Ayata</option>
                    <option value="Hina">Hina</option>
                    <option value="Sohjiroh">Sohjiroh</option>
                    <option value="Takumi">Takumi</option>
                    <option value="Taishin">Taishin</option>
                    <option value="Yushi">Yushi</option>
                    <option value="Rito">Rito</option>
                    <option value="Soichi">Soichi</option>
                    <option value="Risa">Risa</option>
                    <option value="Shiori">Shiori</option>
                    <option value="Ukyo">Ukyo</option>
                    <option value="Koharu">Koharu</option>
                </select>
            </div>
            
            <div id="ready-confirmation-box" class="ready-popup">
                <div class="ready-text" id="ready-text-content">Are you ready?</div>
                <div style="display: flex; justify-content: center; gap: 15px;">
                    <button class="btn-orange" onclick="confirmReadyGO()">GO! 🏃‍♂️</button>
                    <button class="btn-gray" onclick="cancelReadyBack()">Back ↩️</button>
                </div>
            </div>

            <br>
            <button class="btn-green" id="exam-start-btn" style="display:none; font-size:1.3rem;" onclick="submitNameAndStartExam()">スタート (Start! 🚀)</button>
            <button class="btn-gray" id="name-back-btn" onclick="returnToMain()">もどる (Back)</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div style="display:flex; justify-content: space-between; color:#7f8c8d; padding: 0 10px; width: 100%; box-sizing: border-box;">
            <span id="progress-text" class="score-display">もんだい: 0/20</span>
            <span id="score-text" class="score-display">せいかい: 0</span>
        </div>
        <div class="question-box" id="question-text">...</div>
        <div id="typing-panel" style="display:none;" class="input-area">
            <input type="text" id="typing-input" autocomplete="off" placeholder="Type answer...">
            <br><br>
            <button class="btn-blue" id="submit-typing-btn" onclick="checkTypingAnswer()">OK / Submit</button>
        </div>
        <div id="feedback-success-circle" class="feedback-circle"></div>
        <div id="feedback-wrong-hint" class="wrong-hint"></div>
        
        <div id="exam-actions" style="display:none; text-align:center; margin-top:10px; justify-content:center;">
            <button class="btn-blue" onclick="nextQuestion()">つぎへ (Next)</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h2>おしまい (Finished!)</h2>
        <p style="font-size:1.3rem; margin: 3px 0;" id="final-score-text"></p>
        <div id="comment-box" class="comment-display"></div>
        
        <div id="wrong-answers-review" class="review-box" style="display:none;">
            <div class="review-title">もういちど みなおそう (Review Wrong Words)</div>
            <div id="review-list"></div>
        </div>
        <br>
        <button class="btn-green" onclick="returnToMain()">ホーム (Home)</button>
    </div>

    <div id="admin-screen" class="screen">
        <h2>せんせいかんりがめん (Admin Dashboard)</h2>
        <div class="nav-buttons" style="margin-bottom: 8px;">
            <button class="btn-blue" style="padding: 8px 20px; font-size:1rem;" onclick="loadCloudData()">🔄 こうしん</button>
            <button class="btn-red" style="padding: 8px 20px; font-size:1rem;" onclick="clearData()">レコードをけす</button>
            <button class="btn-dark" style="padding: 8px 20px; font-size:1rem;" onclick="returnToMain()">ログアウト</button>
        </div>
        
        <h3>ぜんたいのグラフ</h3>
        <div class="chart-container">
            <canvas id="analyticsChart"></canvas>
        </div>

        <h3>こじんレコード</h3>
        <table id="records-table">
            <thead>
                <tr>
                    <th>なまえ</th>
                    <th>ハイスコア</th>
                    <th>チャレンジ</th>
                    <th>れきし (History)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
const CLOUD_API_URL = "https://api.jsonbin.io/v3/b/6651bb81e41b4d34e4fa0120"; 
const MASTER_KEY = "$2a$10$Rz7T9N4e4G7lK6fGgDqSBuM.i5wM96S5vF9R4GzEwZDe8FvRjVjS."; 

const wordBank = [
    {en: "year", ja: "ねん", kana: "ねん"},
    {en: "spring", ja: "はる", kana: "はる"},
    {en: "summer", ja: "なつ", kana: "なつ"},
    {en: "fall", ja: "あき", kana: "あき"},
    {en: "winter", ja: "ふゆ", kana: "ふゆ"},
    {en: "sunny", ja: "はれた", kana: "はれた"},
    {en: "cloudy", ja: "くもりの", kana: "くもりの"},
    {en: "rainy", ja: "あめの", kana: "あめの"},
    {en: "snowy", ja: "ゆきのふる", kana: "ゆきのふる"},
    {en: "windy", ja: "かぜのつよい", kana: "かぜのつよい"},
    {en: "day", ja: "ひ", kana: "ひ"},
    {en: "date", ja: "ひづけ", kana: "ひづけ"},
    {en: "month", ja: "つき", kana: "つき"},
    {en: "yesterday", ja: "きのう", kana: "きのう"},
    {en: "today", ja: "きょう", kana: "きょう"},
    {en: "tomorrow", ja: "あした", kana: "あした"},
    {en: "morning", ja: "あさ", kana: "あさ"},
    {en: "afternoon", ja: "ごご", kana: "ごご"},
    {en: "evening", ja: "ゆうがた", kana: "ゆうがた"},
    {en: "night", ja: "よる", kana: "よる"}
];

let currentMode = ''; let currentQuestions = []; let currentIndex = 0;
let correctCount = 0; let currentStudent = ''; let hasAnswered = false; let chartInstance = null;
let wrongWordsList = [];

function showScreen(screenId) {
    document.getElementById('main-nav').style.display = 'none';
    document.getElementById('main-hr').style.display = 'none';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    
    if(screenId) {
        document.getElementById(screenId).classList.add('active');
    } else {
        document.getElementById('main-nav').style.display = 'flex';
        document.getElementById('main-hr').style.display = 'block';
    }
}

function returnToMain() { 
    showScreen(''); 
    resetNameSelectionUI();
}

// 重設姓名選擇畫面的原始UI狀態
function resetNameSelectionUI() {
    document.getElementById('student-name-select').value = "";
    document.getElementById('student-name-select').disabled = false;
    document.getElementById('name-title-text').style.display = 'block';
    document.getElementById('select-container-box').style.display = 'block';
    document.getElementById('ready-confirmation-box').style.display = 'none';
    document.getElementById('exam-start-btn').style.display = 'none';
    document.getElementById('name-back-btn').style.display = 'inline-block';
}

function speakEnglish(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; window.speechSynthesis.speak(u);
    }
}
function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

function startExamFlow() { 
    showScreen('name-input-screen'); 
    resetNameSelectionUI();
}

// 當小朋友選擇姓名後的處理（動態隱藏選單，防止遮擋）
function handleNameSelection(name) {
    if(name) {
        currentStudent = name;
        
        // ✨ 精髓優化：選好名字後，隱藏大標題、下拉選單與回到上一頁按鈕，完全騰出空間給彈窗
        document.getElementById('name-title-text').style.display = 'none';
        document.getElementById('select-container-box').style.display = 'none';
        document.getElementById('name-back-btn').style.display = 'none';
        
        document.getElementById('ready-text-content').innerHTML = `Are you ready,<br><span style="font-size:2.2rem; color:#55acee;">${name}</span> ?`;
        document.getElementById('ready-confirmation-box').style.display = 'block';
    } else {
        document.getElementById('ready-confirmation-box').style.display = 'none';
        document.getElementById('exam-start-btn').style.display = 'none';
    }
}

// 按下 GO，隱藏二次確認框，秀出超大火箭出發按鈕
function confirmReadyGO() {
    document.getElementById('ready-confirmation-box').style.display = 'none';
    document.getElementById('exam-start-btn').style.display = 'inline-block';
}

// 點擊 Back 重新挑選：恢復下拉選單外觀
function cancelReadyBack() {
    resetNameSelectionUI();
    currentStudent = '';
}

function submitNameAndStartExam() {
    if(!currentStudent) { alert("Please select your name! / なまえをえらんでね！"); return; }
    currentMode = 'exam'; currentQuestions = shuffle([...wordBank]);
    currentIndex = 0; correctCount = 0; wrongWordsList = []; setupQuestion(); showScreen('quiz-screen');
}

function setupQuestion() {
    if(currentIndex >= 20) { endQuiz(); return; }
    hasAnswered = false; let item = currentQuestions[currentIndex];
    document.getElementById('progress-text').innerText = `もんだい: ${currentIndex + 1}/20`;
    document.getElementById('score-text').innerText = `せいかい: ${correctCount}`;
    document.getElementById('feedback-success-circle').style.display = 'none';
    document.getElementById('feedback-wrong-hint').innerText = '';
    document.getElementById('exam-actions').style.display = 'none';
    
    document.getElementById('question-text').innerText = item.kana; 
    document.getElementById('typing-panel').style.display = 'block';
    document.getElementById('submit-typing-btn').style.display = 'inline-block';
    document.getElementById('typing-input').value = ''; 
    document.getElementById('typing-input').disabled = false;
    setTimeout(() => document.getElementById('typing-input').focus(), 50);
}

function checkTypingAnswer() {
    if(hasAnswered) return;
    let inputField = document.getElementById('typing-input');
    let userAns = inputField.value.trim().toLowerCase();
    let currentItem = currentQuestions[currentIndex];
    let correct = currentItem.en.toLowerCase();
    hasAnswered = true; inputField.disabled = true; document.getElementById('submit-typing-btn').style.display = 'none';

    document.getElementById('exam-actions').style.display = 'flex'; 
    if(userAns === correct) { 
        correctCount++; 
        document.getElementById('feedback-success-circle').style.display = 'block'; 
    } else { 
        wrongWordsList.push(currentItem); 
    }
}

function nextQuestion() { currentIndex++; setupQuestion(); }

function endQuiz() {
    showScreen('result-screen');
    document.getElementById('final-score-text').innerText = `せいかい： ${correctCount} / 20`;
    
    let comment = "";
    if(correctCount >= 15) comment = "すばらしい！ ゆうしゅうな せいせきです！<br>Excellent!";
    else if(correctCount >= 10) comment = "よく できました！ つぎも がんばりましょう！<br>Good job!";
    else comment = "いっしょに れんしゅう しましょう。<br>Let's practice together.";
    document.getElementById('comment-box').innerHTML = comment;
    
    let reviewBox = document.getElementById('wrong-answers-review');
    let reviewList = document.getElementById('review-list');
    reviewList.innerHTML = '';
    
    if(wrongWordsList.length > 0) {
        reviewBox.style.display = 'block';
        wrongWordsList.forEach(item => {
            let div = document.createElement('div');
            div.className = 'review-item';
            div.innerHTML = `<span>🔴 ${item.kana}</span> <span style="font-weight:bold; color:var(--primary-color);">${item.en}</span>`;
            reviewList.appendChild(div);
        });
    } else {
        reviewBox.style.display = 'none';
    }

    if(currentMode === 'exam') { uploadExamData(currentStudent, correctCount); }
}

function uploadExamData(name, score) {
    fetch(CLOUD_API_URL, { headers: { "X-Master-Key": MASTER_KEY } })
    .then(res => res.json())
    .then(resData => {
        let records = resData.record || [];
        let userRecord = records.find(r => r.name === name);
        if(userRecord) {
            userRecord.history.push(score);
            if(score > userRecord.maxScore) userRecord.maxScore = score;
            userRecord.attempts = userRecord.history.length;
        } else {
            records.push({ name: name, maxScore: score, attempts: 1, history: [score] });
        }
        return fetch(CLOUD_API_URL, {
            method: 'PUT',
            headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
            body: JSON.stringify(records)
        });
    }).then(() => console.log("Cloud sync successful!")).catch(err => console.error(err));
}

function loginAdmin() {
    let pwd = prompt("Teacher's Password (せんせいパスワード):");
    if(pwd === "0004") { showScreen('admin-screen'); loadCloudData(); } else { alert("Wrong! / ちがいます！"); }
}

function loadCloudData() {
    let tbody = document.querySelector('#records-table tbody');
    tbody.innerHTML = '<tr><td colspan="4">Loading... 請稍候...</td></tr>';
    fetch(CLOUD_API_URL, { headers: { "X-Master-Key": MASTER_KEY } })
    .then(res => res.json())
    .then(resData => { let data = resData.record || []; renderChartAndTable(data); })
    .catch(err => alert("Cloud connection failed: " + err));
}

function getRandomColor(index) {
    const colors = ['#55acee', '#77dd77', '#ff6961', '#ffb347', '#b19cd9', '#f49ac2', '#aec6cf', '#ffb7ce', '#92a8d1', '#f7cac9'];
    return colors[index % colors.length];
}

function renderChartAndTable(data) {
    let tbody = document.querySelector('#records-table tbody'); tbody.innerHTML = '';
    if(data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4">No record found.</td></tr>';
        if (chartInstance) chartInstance.destroy(); return;
    }
    data.forEach(item => {
        let tr = document.createElement('tr');
        tr.innerHTML = `<td>${item.name}</td><td style="color:var(--success-color); font-weight:bold;">${item.maxScore} / 20</td><td>${item.attempts}</td><td>[ ${item.history.join(', ')} ]</td>`;
        tbody.appendChild(tr);
    });

    let ctx = document.getElementById('analyticsChart').getContext('2d');
    if (chartInstance) { chartInstance.destroy(); }
    let maxAttempts = 1; data.forEach(item => { if(item.attempts > maxAttempts) maxAttempts = item.attempts; });
    let labels = []; for(let i = 1; i <= maxAttempts; i++) { labels.push(`${i}`); }
    let datasets = data.map((item, idx) => {
        let color = getRandomColor(idx);
        return { label: item.name, data: item.history, borderColor: color, backgroundColor: color, borderWidth: 3, pointRadius: 5, fill: false, tension: 0.2 };
    });
    chartInstance = new Chart(ctx, {
        type: 'line', data: { labels: labels, datasets: datasets },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { title: { display: true, text: 'Attempts' } }, y: { beginAtZero: true, max: 20 } } }
    });
}

function clearData() {
    if(confirm("Delete everything on the cloud? \n本当にすべてのクラウドデータを消去しますか？")) {
        fetch(CLOUD_API_URL, {
            method: 'PUT', headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY }, body: JSON.stringify([])
        }).then(() => loadCloudData()).catch(err => console.error(err));
    }
}

document.getElementById('typing-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        checkTypingAnswer();
    }
});
</script>
</body>
