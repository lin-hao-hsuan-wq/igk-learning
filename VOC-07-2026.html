<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGK Kids Learning</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f0f9ff;
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #ff6b6b;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px #ffe3e3;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .mode-buttons {
            margin-bottom: 30px;
        }
        button.mode-btn {
            background-color: #4cc9f0;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin: 0 10px;
            transition: transform 0.2s, background-color 0.2s;
        }
        button.mode-btn:hover {
            background-color: #4361ee;
            transform: scale(1.05);
        }
        button.active {
            background-color: #4361ee;
            box-shadow: 0 0 10px rgba(67, 97, 238, 0.5);
        }
        .game-section {
            display: none;
        }
        .game-section.active {
            display: block;
        }
        
        /* 表格樣式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 2px solid #e0e0e0;
            padding: 12px;
            font-size: 1.1rem;
        }
        th {
            background-color: #f72585;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        /* 模式一：對對碰樣式 */
        .match-container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .column {
            width: 45%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card {
            background-color: #f8f9fa;
            border: 3px solid #dee2e6;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }
        .card:hover {
            background-color: #e9ecef;
            border-color: #6c757d;
        }
        .card.selected {
            background-color: #ffe3e3;
            border-color: #ff6b6b;
        }
        .card.matched {
            background-color: #d4edda;
            border-color: #28a745;
            color: #155724;
            cursor: default;
            visibility: hidden;
        }

        /* 模式二：打字練習樣式 */
        .typing-box {
            background-color: #fff3cd;
            padding: 30px;
            border-radius: 15px;
            border: 3px dashed #ffc107;
            max-width: 500px;
            margin: 20px auto;
        }
        .jp-question {
            font-size: 2rem;
            font-weight: bold;
            color: #856404;
            margin-bottom: 20px;
        }
        .en-input {
            font-size: 1.8rem;
            padding: 10px;
            width: 80%;
            text-align: center;
            border: 3px solid #ced4da;
            border-radius: 10px;
            outline: none;
        }
        .en-input:focus {
            border-color: #4cc9f0;
        }
        .submit-btn {
            margin-top: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.2rem;
            border-radius: 5px;
            cursor: pointer;
        }

        /* 自訂彈窗樣式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 80%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            text-align: center;
            border: 5px solid #dc3545;
        }
        .modal-content h2 {
            color: #dc3545;
            margin-top: 0;
        }
        .modal-content p {
            font-size: 1.3rem;
            line-height: 1.6;
        }
        .modal-close {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>IGK</h1>
        <p style="font-size: 1.1rem; color: #666;">Learning English</p>
        
        <div class="mode-buttons">
            <button id="btn-list" class="mode-btn active" onclick="switchMode('list', this)">たんご いちらん</button>
            <button id="btn-match" class="mode-btn" onclick="switchMode('match', this)">えいご えらびゲーム</button>
            <button id="btn-typing" class="mode-btn" onclick="switchMode('typing', this)">タイピング れんしゅう</button>
        </div>

        <div id="list-mode" class="game-section active">
            <h2>たんご いちらん</h2>
            <p>まずは ここで えいごと にほんごを おぼえてね！</p>
            <table id="word-table">
                <thead>
                    <tr>
                        <th>えいご</th>
                        <th>にほんご</th>
                        <th>こえ</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>

        <div id="match-mode" class="game-section">
            <h2>えらびゲーム</h2>
            <p>おなじ いみの えいごと にほんごを えらんでね！</p>
            <button onclick="initMatchGame()" style="margin-bottom:15px; padding: 5px 10px; font-size:1rem; cursor:pointer;">つぎの もんだい (換一組字)</button>
            <div class="match-container">
                <div class="column" id="en-column"></div>
                <div class="column" id="jp-column"></div>
            </div>
        </div>

        <div id="typing-mode" class="game-section">
            <h2>タイピング</h2>
            <p>にほんごを みて、えいごを キーボードで うちましょう！</p>
            <div class="typing-box">
                <div class="jp-question" id="typing-question">にほんご</div>
                <input type="text" class="en-input" id="typing-input" placeholder="ここに入力してね" autocomplete="off">
                <br>
                <button class="submit-btn" onclick="checkTyping()">こたえあわせ</button>
            </div>
            <p id="typing-score" style="font-weight: bold; color: #4361ee;"></p>
        </div>
    </div>

    <div class="modal" id="error-modal">
        <div class="modal-content">
            <h2>ざんねん！ちがうよ 😢</h2>
            <hr>
            <p id="error-msg"></p>
            <button class="modal-close" onclick="closeModal()">つぎへ すすむ</button>
        </div>
    </div>

    <script>
        // 20個指定單字（純假名版）
        const wordData = [
            { en: "it", jp: "それ" },
            { en: "this", jp: "これ" },
            { en: "that", jp: "あれ" },
            { en: "family", jp: "かぞく" },
            { en: "father", jp: "おとうさん" },
            { en: "mother", jp: "おかあさん" },
            { en: "brother", jp: "きょうだい" },
            { en: "sister", jp: "しまい" },
            { en: "grandfather", jp: "おじいさん" },
            { en: "grandmother", jp: "おばあさん" },
            { en: "boy", jp: "おとこのこ" },
            { en: "girl", jp: "おんなのこ" },
            { en: "friend", jp: "ともだち" },
            { en: "everyone", jp: "みなさん" },
            { en: "old", jp: "ふるい / としをとった" },
            { en: "young", jp: "わかい" },
            { en: "funny", jp: "おもしろい" },
            { en: "kind", jp: "やさしい" },
            { en: "strong", jp: "つよい" },
            { en: "busy", jp: "いそがしい" }
        ];

        // 語音播放功能
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.8; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // 初始化網頁資料
        window.onload = function() {
            const tableBody = document.querySelector("#word-table tbody");
            tableBody.innerHTML = ""; 
            wordData.forEach(word => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td style="font-weight:bold; color:#4361ee;">${word.en}</td>
                    <td>${word.jp}</td>
                    <td><button onclick="speak('${word.en}')" style="cursor:pointer; border-radius:5px; border:1px solid #ccc; background:#fff; padding:3px 8px;">🔊</button></td>
                `;
                tableBody.appendChild(tr);
            });
            
            // 綁定輸入框 Enter 鍵事件
            document.getElementById("typing-input").addEventListener("keyup", function(event) {
                if (event.key === "Enter") {
                    checkTyping();
                }
            });
        };

        // 切換模式（修復完成：不再被截斷）
        function switchMode(mode, element) {
            document.querySelectorAll('.game-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            
            element.classList.add('active');
            document.getElementById(`${mode}-mode`).classList.add('active');

            if (mode === 'match') initMatchGame();
            if (mode === 'typing') initTypingGame();
        }

        /* --- 模式一：對對碰 邏輯 --- */
        let selectedEn = null;
        let selectedJp = null;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function initMatchGame() {
            const enColumn = document.getElementById("en-column");
            const jpColumn = document.getElementById("jp-column");
            enColumn.innerHTML = "";
            jpColumn.innerHTML = "";
            selectedEn = null;
            selectedJp = null;

            const shuffledWords = shuffle([...wordData]).slice(0, 5);
            const enWords = shuffle([...shuffledWords]);
            const jpWords = shuffle([...shuffledWords]);

            enWords.forEach(word => {
                const div = document.createElement("div");
                div.className = "card";
                div.innerText = word.en;
                div.dataset.en = word.en;
                div.onclick = function() { selectCard(div, 'en'); };
                enColumn.appendChild(div);
            });

            jpWords.forEach(word => {
                const div = document.createElement("div");
                div.className = "card";
                div.innerText = word.jp;
                div.dataset.en = word.en; 
                div.dataset.jp = word.jp;
                div.onclick = function() { selectCard(div, 'jp'); };
                jpColumn.appendChild(div);
            });
        }

        function selectCard(card, type) {
            if (card.classList.contains('matched')) return;

            if (type === 'en') {
                document.querySelectorAll('#en-column .card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedEn = card;
            } else {
                document.querySelectorAll('#jp-column .card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedJp = card;
            }

            if (selectedEn && selectedJp) {
                if (selectedEn.dataset.en === selectedJp.dataset.en) {
                    speak(selectedEn.dataset.en);
                    selectedEn.classList.add('matched');
                    selectedJp.classList.add('matched');
                    selectedEn = null;
                    selectedJp = null;
                    
                    setTimeout(() => {
                        const remaining = document.querySelectorAll('.card:not(.matched)');
                        if (remaining.length === 0) {
                            alert("すごーい！ぜんぶ せいかい！");
                            initMatchGame();
                        }
                    }, 500);
                } else {
                    const correctEn = selectedJp.dataset.en;
                    const correctJp = selectedJp.dataset.jp;
                    showErrorModal(correctEn, correctJp);
                    
                    selectedEn.classList.remove('selected');
                    selectedJp.classList.remove('selected');
                    selectedEn = null;
                    selectedJp = null;
                }
            }
        }

        /* --- 模式二：看日文打英文 邏輯 --- */
        let currentTypingIndex = 0;
        let typingWords = [];

        function initTypingGame() {
            typingWords = shuffle([...wordData]);
            currentTypingIndex = 0;
            showNextTyping();
        }

        function showNextTyping() {
            if (currentTypingIndex < typingWords.length) {
                document.getElementById("typing-question").innerText = typingWords[currentTypingIndex].jp;
                document.getElementById("typing-input").value = "";
                document.getElementById("typing-input").focus();
                document.getElementById("typing-score").innerText = `もんだい: ${currentTypingIndex + 1} / ${typingWords.length}`;
            } else {
                alert("全問クリア！がんばったね！🌟");
                initTypingGame();
            }
        }

        function checkTyping() {
            const inputField = document.getElementById("typing-input");
            const userAns = inputField.value.trim().toLowerCase();
            const correctAns = typingWords[currentTypingIndex].en.toLowerCase();

            if (userAns === correctAns) {
                speak(typingWords[currentTypingIndex].en);
                currentTypingIndex++;
                showNextTyping();
            } else {
                showErrorModal(typingWords[currentTypingIndex].en, typingWords[currentTypingIndex].jp);
            }
        }

        /* --- 彈窗 Modal 控制邏輯 --- */
        function showErrorModal(en, jp) {
            document.getElementById("error-msg").innerHTML = `にほんご: ${jp}<br><br><span style="font-size:1.8rem; color:#4361ee; font-weight:bold;">せいかい: ${en}</span>`;
            document.getElementById("error-modal").style.display = "flex";
            speak(en);
        }

        function closeModal() {
            document.getElementById("error-modal").style.display = "none";
            document.getElementById("typing-input").focus();
        }
    </script>
</body>
</html>
