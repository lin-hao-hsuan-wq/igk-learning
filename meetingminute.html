<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IGK のあしあと </title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Nunito', 'Noto Sans JP', 'sans-serif'],
          },
          colors: {
            rila: {
              brown: '#c39b62',
              dark: '#3d2109',
              light: '#fdf8f2',
              cream: '#faf5eb',
              yellow: '#ffde59',
              pink: '#ff8da1',
              darkbrown: '#5c3c25',
              softOrange: '#ffb347'
            }
          }
        }
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, collection } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    const defaultFirebaseConfig = {
      apiKey: "YOUR_FIREBASE_API_KEY",
      authDomain: "YOUR_FIREBASE_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_FIREBASE_PROJECT_ID",
      storageBucket: "YOUR_FIREBASE_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_FIREBASE_SENDER_ID",
      appId: "YOUR_FIREBASE_APP_ID"
    };

    window.initFirebaseSystem = async function() {
      let config = null;
      
      if (typeof __firebase_config !== 'undefined') {
        config = JSON.parse(__firebase_config);
      } else if (defaultFirebaseConfig.apiKey !== "YOUR_FIREBASE_API_KEY") {
        config = defaultFirebaseConfig;
      }

      if (!config) {
        console.warn("Firebase config not set. Falling back to LocalStorage.");
        return null;
      }

      try {
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let user = null;
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
           await signInWithCustomToken(auth, __initial_auth_token);
        } else {
           await signInAnonymously(auth);
        }

        return new Promise((resolve) => {
          onAuthStateChanged(auth, (u) => {
            user = u;
            window.firebaseApp = { db, user, appId };
            resolve(true);
          });
        });
      } catch (e) {
        console.error("Firebase init error:", e);
        return null;
      }
    };

    window.saveRecordToDB = async function(dateStr, data) {
      if (window.firebaseApp && window.firebaseApp.user) {
        const { db, user, appId } = window.firebaseApp;
        try {
          const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'meeting_records', dateStr);
          await setDoc(docRef, data);
          return true;
        } catch(e) {
          console.error("Firebase Save error:", e);
          return false;
        }
      } else {
        localStorage.setItem(`rilakkuma_record_${dateStr}`, JSON.stringify(data));
        return true;
      }
    };

    window.loadRecordFromDB = async function(dateStr) {
      if (window.firebaseApp && window.firebaseApp.user) {
        const { db, user, appId } = window.firebaseApp;
        try {
          const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'meeting_records', dateStr);
          const docSnap = await getDoc(docRef);
          if (docSnap.exists()) {
            return docSnap.data();
          }
        } catch(e) {
          console.error("Firebase Load error:", e);
        }
      } else {
        const localData = localStorage.getItem(`rilakkuma_record_${dateStr}`);
        if (localData) return JSON.parse(localData);
      }
      return null;
    };

    window.translateWithGemini = async function(text) {
      if (!text || text.trim() === '') return { ja: '', en: '' };
      let apiKey = localStorage.getItem('gemini_api_key');
      
      if (!apiKey) {
        apiKey = prompt("🐻 自動翻訳には Gemini API Key が必要です！\nAPIキーを入力してください（このPCにのみ保存されます）。");
        if (apiKey && apiKey.trim() !== "") {
          localStorage.setItem('gemini_api_key', apiKey.trim());
        } else {
          throw new Error("API Key cancelled");
        }
      }

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
      const payload = {
          contents: [{ parts: [{ text }] }],
          systemInstruction: { parts: [{ text: "You are a professional translator. Translate the given text into highly natural Japanese and English. Respond ONLY with a valid JSON object in this exact format: {\"ja\": \"[Japanese translation]\", \"en\": \"[English translation]\"}." }] },
          generationConfig: { responseMimeType: "application/json" }
      };

      try {
          const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'application/json' } });
          if (!res.ok) {
              if (res.status === 400 || res.status === 403) {
                  localStorage.removeItem('gemini_api_key');
                  throw new Error("Invalid API Key");
              }
              throw new Error("API error");
          }
          const data = await res.json();
          let jsonStr = data.candidates[0].content.parts[0].text;
          jsonStr = jsonStr.replace(/```json/gi, '').replace(/```/g, '').trim();
          return JSON.parse(jsonStr);
      } catch (err) {
          throw err;
      }
    };
    
    window.resetApiKey = function() {
        localStorage.removeItem('gemini_api_key');
        alert("🐻 API Key を削除しました！次回入力時に再設定してください。");
    };
  </script>

  <script>
    const MOTIVATIONAL_QUOTES = [
      { ja: "どんなに高い山でも、一歩ずつ登れば必ず頂上に着く。", en: "No matter how high the mountain, you will reach the top if you climb step by step." },
      { ja: "失敗は成功の母。", en: "Failure is the mother of success." },
      { ja: "継続は力なり。", en: "Continuity is power." },
      { ja: "笑う門には福来る。", en: "Fortune comes to a laughing gate." }
    ];

    const DEFAULT_MEMBERS = [
      { id: 1, name: 'minori kadono', avatar: 'korilakkuma', status: 'present', report: '', reportJa: '', reportEn: '', isTranslating: false, lastTranslatedText: '' },
      { id: 2, name: 'yuri kato', avatar: 'kiiroitori', status: 'present', report: '', reportJa: '', reportEn: '', isTranslating: false, lastTranslatedText: '' },
      { id: 3, name: 'Yassmyn Khairussalima Ratu', avatar: 'chairoikoguma', status: 'present', report: '', reportJa: '', reportEn: '', isTranslating: false, lastTranslatedText: '' },
      { id: 4, name: 'yoon honey aung', avatar: 'pinksquirrel', status: 'present', report: '', reportJa: '', reportEn: '', isTranslating: false, lastTranslatedText: '' },
      { id: 5, name: '林昊嬛', avatar: 'rilakkuma', status: 'present', report: '', reportJa: '', reportEn: '', isTranslating: false, lastTranslatedText: '' }
    ];

    document.addEventListener('alpine:init', () => {
      Alpine.data('meetingApp', meetingApp);
    });

    function meetingApp() {
      return {
        members: JSON.parse(JSON.stringify(DEFAULT_MEMBERS)),
        announcements: [],
        newMemberName: '',
        newMemberAvatar: 'rilakkuma',
        newAnnouncement: '',
        meetingDate: new Date().toISOString().split('T')[0],
        showToast: false,
        toastMessage: '',
        showAddMemberMenu: false,
        dailyQuote: MOTIVATIONAL_QUOTES[0],

        // --- 🥞 雜談轉盤專用變數 ---
        dailyTalkTopic: { ja: '', en: '' },
        isSpinning: false,
        currentAngle: 0,
        animationFrame: null,
        winner: null,

        async init() {
          const daysSinceEpoch = Math.floor(Date.now() / 86400000);
          this.dailyQuote = MOTIVATIONAL_QUOTES[daysSinceEpoch % MOTIVATIONAL_QUOTES.length];

          this.initDailyTopic();

          const checkAndInit = async () => {
            if (typeof window.initFirebaseSystem === 'function') {
              await window.initFirebaseSystem();
              this.loadRecord(this.meetingDate);
            } else {
              setTimeout(checkAndInit, 100);
            }
          };
          checkAndInit();

          this.$watch('meetingDate', (newDate) => {
             this.loadRecord(newDate);
          });
        },

        // --- 🎯 每天隨機 15 題雜談 (4天防撞題) ---
        initDailyTopic() {
          const TOPICS = [
            { ja: "最近食べた美味しいもの", en: "Recently eaten delicious food" },
            { ja: "おすすめの映画・アニメ", en: "Recommended movie/anime" },
            { ja: "もし100万円自由に使えたら", en: "If you had 1 million yen" },
            { ja: "最近やらかした小さな失敗", en: "Recent small mistake" },
            { ja: "子供の頃の夢", en: "Childhood dream" },
            { ja: "今週末の予定", en: "Weekend plans" },
            { ja: "自分を動物に例えると？", en: "If you were an animal" },
            { ja: "タイムトラベルできるならいつ？", en: "If you could time travel" },
            { ja: "最近一番笑ったこと", en: "What made you laugh recently" },
            { ja: "好きな季節とその理由", en: "Favorite season and why" },
            { ja: "超能力が一つだけ使えるなら", en: "If you had one superpower" },
            { ja: "会ってみたい歴史上の人物", en: "Historical figure you want to meet" },
            { ja: "よく聴く音楽のジャンル", en: "Favorite music genre" },
            { ja: "私だけのストレス発散法", en: "My stress relief method" },
            { ja: "無人島に一つ持っていくなら", en: "One item to take to a deserted island" }
          ];

          const todayStr = new Date().toISOString().split('T')[0];
          let savedData = JSON.parse(localStorage.getItem('igk_daily_topic') || '{}');

          // 如果今天已經抽過了，就顯示今天的題目
          if (savedData.date === todayStr && savedData.topic) {
            this.dailyTalkTopic = savedData.topic;
          } else {
            // 從沒出現過的題目中挑選 (鎖定最近 4 天的紀錄)
            let history = savedData.history || [];
            let availableIndexes = [];
            for (let i = 0; i < TOPICS.length; i++) {
              if (!history.includes(i)) availableIndexes.push(i);
            }
            
            // 如果某種原因全部都被鎖了（防呆），強制作為備用
            if (availableIndexes.length === 0) availableIndexes = [0]; 
            
            const chosenIndex = availableIndexes[Math.floor(Math.random() * availableIndexes.length)];
            
            // 更新歷史紀錄陣列 (保留最後 4 個)
            history.push(chosenIndex);
            if (history.length > 4) history.shift();

            this.dailyTalkTopic = TOPICS[chosenIndex];
            localStorage.setItem('igk_daily_topic', JSON.stringify({
              date: todayStr,
              topic: this.dailyTalkTopic,
              history: history
            }));
          }
        },

        // --- 🥞 轉盤控制邏輯 ---
        toggleSpin() {
          if (this.isSpinning) {
            // 按下停止
            this.isSpinning = false;
            cancelAnimationFrame(this.animationFrame);
            
            // 計算是誰中獎
            if (this.members.length > 0) {
               const actualRotation = this.currentAngle % 360;
               const sliceAngle = 360 / this.members.length;
               // 修正因為 conic-gradient 和順時針旋轉產生的角度差
               const pointedAngle = (360 - actualRotation) % 360;
               const winnerIndex = Math.floor(pointedAngle / sliceAngle);
               this.winner = this.members[winnerIndex].name;
               this.triggerToast(`🎉 ${this.winner} の番です！ / It's ${this.winner}'s turn! 🥞`);
            }
          } else {
            // 按下開始
            if (this.members.length === 0) return;
            this.isSpinning = true;
            this.winner = null;
            this.animateSpin();
          }
        },

        animateSpin() {
          if (!this.isSpinning) return;
          this.currentAngle += 15; // 轉速調整
          this.animationFrame = requestAnimationFrame(() => this.animateSpin());
        },

        getWheelGradient() {
          if (this.members.length === 0) return 'transparent';
          const colors = ['#ffde59', '#ffb347', '#ff8da1', '#c39b62', '#e2f0d9', '#fdf8f2'];
          const slice = 360 / this.members.length;
          let stops = [];
          for(let i=0; i < this.members.length; i++) {
            const color = colors[i % colors.length];
            stops.push(`${color} ${i * slice}deg ${(i + 1) * slice}deg`);
          }
          return `conic-gradient(${stops.join(', ')})`;
        },

        async loadRecord(dateStr) {
          try {
            const data = await window.loadRecordFromDB(dateStr);
            if (data && Array.isArray(data.members) && data.members.length > 0) {
              this.members = data.members.map(m => ({
                 ...m, isTranslating: false, lastTranslatedText: m.report
              }));
              this.announcements = data.announcements || [];
              this.triggerToast(`📅 読み込み完了 / Loaded records for ${dateStr}`);
            } else {
              this.members = JSON.parse(JSON.stringify(DEFAULT_MEMBERS));
              this.announcements = data?.announcements || [];
            }
          } catch(e) {
            this.members = JSON.parse(JSON.stringify(DEFAULT_MEMBERS));
          }
        },

        async saveRecord() {
          const dataToSave = {
            members: this.members.map(m => ({
              id: m.id, name: m.name, avatar: m.avatar, status: m.status, 
              report: m.report, reportJa: m.reportJa, reportEn: m.reportEn
            })),
            announcements: this.announcements
          };
          const success = await window.saveRecordToDB(this.meetingDate, dataToSave);
          if (success) this.triggerToast('💾 記録を保存しました / Records successfully saved!');
          else this.triggerToast('⚠️ 保存に失敗しました / Failed to save records.');
        },

        async autoTranslate(member) {
          const text = member.report.trim();
          if (!text || text === member.lastTranslatedText) return;
          member.isTranslating = true;
          try {
            const result = await window.translateWithGemini(text);
            if (result && result.ja && result.en) {
              member.reportJa = result.ja;
              member.reportEn = result.en;
              member.lastTranslatedText = text;
            }
          } catch(e) {
            this.triggerToast('⚠️ 翻訳エラー / Translation Error');
          }
          member.isTranslating = false;
        },

        getStatusText(status) {
          switch (status) {
            case 'present': return '出席 / Present';
            case 'tardy': return '遅刻 / Late';
            case 'absent': return '欠席 / Absent';
            default: return '出席 / Present';
          }
        },

        cycleStatus(member) {
          if (member.status === 'present') member.status = 'tardy';
          else if (member.status === 'tardy') member.status = 'absent';
          else member.status = 'present';
        },

        formatDate(dateStr) {
          if (!dateStr) return '';
          const d = new Date(dateStr);
          const year = d.getFullYear();
          const month = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          const weekDays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
          return `${year}/${month}/${day} (${weekDays[d.getDay()]})`;
        },

        addMember() {
          const nameTrimmed = this.newMemberName.trim();
          if (!nameTrimmed) return;
          this.members.push({
            id: Date.now(), name: nameTrimmed, avatar: this.newMemberAvatar,
            status: 'present', report: '', reportJa: '', reportEn: '', isTranslating: false, lastTranslatedText: ''
          });
          this.newMemberName = '';
          this.showAddMemberMenu = false;
        },

        removeMember(id) { this.members = this.members.filter(m => m.id !== id); },
        addAnnouncement() {
          const textTrimmed = this.newAnnouncement.trim();
          if (!textTrimmed) return;
          this.announcements.push({ id: Date.now(), text: textTrimmed, completed: false });
          this.newAnnouncement = '';
        },
        toggleAnnouncement(id) {
          const item = this.announcements.find(a => a.id === id);
          if (item) item.completed = !item.completed;
        },
        removeAnnouncement(id) { this.announcements = this.announcements.filter(a => a.id !== id); },
        triggerToast(message) {
          this.toastMessage = message;
          this.showToast = true;
          setTimeout(() => { this.showToast = false; }, 3500);
        },
        copyMeetingMinutes() {
          let text = `🐻【会議議事録 / Meeting Minutes】🍯\n📅 日付：${this.formatDate(this.meetingDate)}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
          text += `📢 【共有事項 / Shared Information】\n`;
          if (this.announcements.length === 0) text += `（特になし）\n`;
          else this.announcements.forEach((ann, idx) => text += `${idx + 1}. [${ann.completed ? '✅' : '📌'}] ${ann.text}\n`);
          text += `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n👥 【個人レポート / Individual Reports】\n`;
          this.members.forEach((m) => {
            text += `👤 ${m.name} (${this.getStatusText(m.status)})\n`;
            if (m.status === 'absent') text += `   ↳ 💤 欠席 / Absent\n\n`;
            else {
              text += `   ↳ [Original]: ${m.report.trim() ? m.report : '...'}\n`;
              if (m.reportJa) text += `   ↳ [JP]: ${m.reportJa}\n`;
              if (m.reportEn) text += `   ↳ [EN]: ${m.reportEn}\n\n`;
            }
          });
          const tempTextarea = document.createElement('textarea');
          tempTextarea.value = text;
          document.body.appendChild(tempTextarea);
          tempTextarea.select();
          document.execCommand('copy');
          document.body.removeChild(tempTextarea);
          this.triggerToast('📋 議事録をコピーしました / Minutes Copied! 🐻✨');
        },
        printMinutes() { window.print(); },
        resetMeeting() {
          if (window.confirm("データを初期化しますか？\nAre you sure you want to reset everything?")) {
            this.announcements = [];
            this.members = JSON.parse(JSON.stringify(DEFAULT_MEMBERS));
          }
        }
      };
    }
  </script>

  <style>
    body {
      background-color: #f7eedf;
      background-image: radial-gradient(#e0cfb8 1.5px, transparent 1.5px);
      background-size: 24px 24px;
    }
    .rila-card { border: 3px solid #3d2109; box-shadow: 6px 6px 0px #3d2109; }
    .rila-inset-shadow { box-shadow: inset 0 2px 4px rgba(61, 33, 9, 0.08); }
    @media print {
      body { background: white !important; color: black !important; }
      .no-print { display: none !important; }
      .rila-card { box-shadow: none !important; border: 1px solid #3d2109 !important; }
      textarea, input { border: none !important; resize: none !important; background: transparent !important; }
    }
    .horizontal-scroll::-webkit-scrollbar { height: 10px; }
    .horizontal-scroll::-webkit-scrollbar-track { background: #fdf8f2; border-radius: 9999px; border: 1px solid #e0cfb8; }
    .horizontal-scroll::-webkit-scrollbar-thumb { background: #c39b62; border-radius: 9999px; border: 2px solid #fdf8f2; }
  </style>
</head>
<body class="min-h-screen text-rila-dark pb-16 antialiased">

  <div x-data="meetingApp()" class="container mx-auto px-4 py-8 max-w-6xl">
    
    <header class="rila-card bg-rila-light rounded-3xl p-6 mb-8 flex flex-col md:flex-row items-center justify-between relative overflow-hidden">
      <div class="flex items-center gap-4 z-10">
        <h1 class="text-3xl md:text-3xl font-extrabold tracking-wide flex items-center gap-2">IGK のあしあと 🍯</h1>
      </div>
      <div class="mt-4 md:mt-0 z-10 flex items-center gap-3">
        <span class="text-xs font-bold tracking-wider text-rila-brown bg-[#eddcc4] px-3 py-1 rounded-full whitespace-nowrap">DATE</span>
        <h2 class="text-2xl font-black text-rila-dark whitespace-nowrap" x-text="formatDate(meetingDate)"></h2>
        <div class="relative no-print flex-shrink-0">
          <input type="date" x-model="meetingDate" class="absolute inset-0 opacity-0 cursor-pointer w-8 h-8 z-20" />
          <button class="bg-rila-yellow hover:bg-yellow-400 p-2 rounded-full border-2 border-rila-dark transition-colors shadow-sm">📅</button>
        </div>
      </div>
    </header>

    <div class="flex flex-col gap-8 items-stretch">
      <section class="w-full no-print">
        <div class="rila-card bg-white rounded-3xl p-6 relative">
          <div class="flex items-center justify-between mb-4 border-b-2 border-dashed border-rila-brown pb-3">
            <h3 class="text-xl font-black flex items-center gap-2">
              🐾 メンバーリスト <span class="text-xs bg-rila-yellow border border-rila-dark px-2 py-0.5 rounded-full" x-text="members.length"></span>
            </h3>
            <button @click="showAddMemberMenu = !showAddMemberMenu" class="bg-rila-brown text-white border-2 border-rila-dark w-8 h-8 rounded-full flex items-center justify-center font-bold shadow-md z-20">＋</button>
          </div>
          <ul class="flex flex-row gap-4 overflow-x-auto pb-4 pt-2 horizontal-scroll">
            <template x-for="member in members" :key="member.id">
              <li class="flex flex-col items-center p-3 rounded-2xl border-2 border-transparent hover:bg-rila-light/40 relative flex-shrink-0 w-32 group">
                <button @click="removeMember(member.id)" class="absolute top-1 right-1 text-xs text-red-400 opacity-0 group-hover:opacity-100 bg-white rounded-full p-1 shadow-sm z-10">🗑️</button>
                <div class="cursor-pointer hover:scale-110 mb-2 w-14 h-14 bg-rila-yellow rounded-full border border-rila-dark flex items-center justify-center" @click="cycleStatus(member)">
                  🐻
                </div>
                <div class="flex flex-col items-center w-full overflow-hidden">
                  <span class="font-bold text-sm text-rila-dark truncate w-full text-center" x-text="member.name"></span>
                  <span class="text-[10px] px-2 py-0.5 mt-1 rounded-full border border-rila-dark font-black bg-[#e2f0d9] text-[#385723]" x-text="getStatusText(member.status)"></span>
                </div>
              </li>
            </template>
          </ul>
        </div>
      </section>

      <main class="w-full flex flex-col space-y-8">
        
        <section class="rila-card bg-white rounded-3xl p-6 relative flex flex-col md:flex-row gap-6 no-print">
          <div class="flex-1 flex flex-col">
            <h3 class="text-xl font-black mb-4 text-rila-dark border-b-2 border-rila-dark pb-2">
              💬 本日の雑談 / Today's Topic
            </h3>
            <div class="bg-rila-light border-2 border-rila-brown rounded-2xl p-4 text-center flex-1 flex flex-col justify-center items-center shadow-inner relative">
              <span class="absolute top-2 left-3 text-2xl opacity-30">✨</span>
              <p class="text-lg md:text-xl font-black text-rila-dark" x-text="dailyTalkTopic.ja"></p>
              <p class="text-sm font-bold text-rila-brown mt-2" x-text="dailyTalkTopic.en"></p>
            </div>
          </div>

          <div class="flex flex-col items-center justify-center border-t-2 md:border-t-0 md:border-l-2 border-dashed border-rila-brown/40 pt-6 md:pt-0 pl-0 md:pl-6 min-w-[220px]">
            <h3 class="text-lg font-black mb-3 text-rila-dark">🎯 ルーレット</h3>
            <div class="relative w-48 h-48 rounded-full border-4 border-rila-dark shadow-lg overflow-hidden bg-white">
               <div class="absolute inset-0 rounded-full"
                    :style="`transform: rotate(${currentAngle}deg); background: ${getWheelGradient()}`">
                  <template x-for="(m, i) in members">
                     <div class="absolute w-full h-full flex items-center justify-center pointer-events-none origin-center"
                          :style="`transform: rotate(${i * (360/members.length) + (180/members.length)}deg)`">
                        <span class="text-[10px] font-black text-rila-dark translate-y-[-65px] whitespace-nowrap bg-white/70 px-1.5 py-0.5 rounded shadow-sm" x-text="m.name"></span>
                     </div>
                  </template>
               </div>
               <div class="absolute top-0 left-1/2 -ml-2.5 -mt-1 w-0 h-0 border-l-[10px] border-r-[10px] border-t-[16px] border-l-transparent border-r-transparent border-t-red-600 z-20 drop-shadow-md"></div>
               
               <button @click="toggleSpin()" 
                       class="absolute inset-0 m-auto w-14 h-14 bg-white rounded-full border-4 border-rila-dark shadow-md flex items-center justify-center text-3xl z-10 hover:scale-110 active:scale-95 transition-transform"
                       :class="{'animate-pulse bg-rila-yellow shadow-[0_0_15px_rgba(255,222,89,0.8)]': isSpinning}">
                  🥞
               </button>
            </div>
            
            <div class="mt-4 text-base font-black text-rila-dark min-h-[1.5rem] bg-rila-yellow px-4 py-1 rounded-full border-2 border-rila-dark shadow-sm" 
                 x-show="winner" x-transition>
              👑 <span x-text="winner"></span>
            </div>
          </div>
        </section>

        <section class="rila-card bg-[#fffcf5] rounded-3xl p-6 relative">
          <div class="absolute -top-3 -right-3 bg-rila-yellow border-2 border-rila-dark text-xs font-extrabold px-3 py-1 rotate-12 rounded-lg shadow-md no-print">HOT 🔥</div>
          <h3 class="text-xl font-black mb-4 flex items-center gap-2 text-rila-dark border-b-2 border-rila-dark pb-2">🍯 共有事項</h3>
          <div class="flex gap-2 mb-6 no-print">
            <input type="text" x-model="newAnnouncement" @keydown.enter="addAnnouncement()" placeholder="事項を入力..." class="flex-1 px-4 py-2 border-2 border-rila-dark rounded-xl" />
            <button @click="addAnnouncement()" class="bg-rila-yellow border-2 border-rila-dark px-4 py-2 rounded-xl font-black">追加</button>
          </div>
          <ul class="space-y-3">
            <template x-for="ann in announcements" :key="ann.id">
              <li class="flex items-start justify-between bg-rila-light/60 border-2 border-rila-dark/15 p-3 rounded-2xl" :class="{'opacity-60 line-through': ann.completed}">
                <div class="flex items-start gap-3 flex-1">
                  <button @click="toggleAnnouncement(ann.id)" class="mt-0.5">📌</button>
                  <span class="text-sm font-bold text-rila-dark pt-0.5" x-text="ann.text"></span>
                </div>
                <button @click="removeAnnouncement(ann.id)" class="text-xs text-red-400 ml-2 pt-0.5 no-print">🗑️</button>
              </li>
            </template>
          </ul>
        </section>

        <section class="space-y-6">
          <h3 class="text-xl font-black flex items-center gap-2 text-rila-dark border-b-2 border-rila-dark pb-2">🍪 個人レポート</h3>
          <div class="space-y-4">
            <template x-for="member in members" :key="member.id">
              <div class="rila-card bg-white rounded-3xl p-5" :class="{'opacity-60 bg-gray-100': member.status === 'absent'}">
                <div class="flex items-center justify-between mb-3 border-b border-dashed border-rila-brown/30 pb-2">
                  <h4 class="font-extrabold text-lg text-rila-dark" x-text="member.name"></h4>
                  <select x-model="member.status" class="no-print border-2 border-rila-dark rounded-lg px-2 py-0.5 text-xs font-bold bg-[#faf5eb]">
                    <option value="present">🟢 出席/Present</option>
                    <option value="tardy">🟡 遅刻/Late</option>
                    <option value="absent">🔴 欠席/Absent</option>
                  </select>
                </div>
                <template x-if="member.status !== 'absent'">
                  <div>
                    <textarea x-model="member.report" @blur="autoTranslate(member)" placeholder="進捗を入力... ✍️" rows="2" class="w-full px-4 py-2 border-2 border-rila-dark/30 rounded-2xl bg-rila-light/30 text-sm"></textarea>
                    <div class="mt-2 space-y-2 no-print">
                      <div class="bg-[#fcf8f2] p-2.5 rounded-xl border border-rila-brown/30 flex gap-2"><span class="font-bold text-xs text-rila-brown">JA:</span><input type="text" x-model="member.reportJa" class="bg-transparent w-full text-sm"></div>
                      <div class="bg-[#f2f8fc] p-2.5 rounded-xl border border-[#b2c8d6] flex gap-2"><span class="font-bold text-xs text-[#527993]">EN:</span><input type="text" x-model="member.reportEn" class="bg-transparent w-full text-sm"></div>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </section>
      </main>
    </div>

    <footer class="mt-12 flex flex-col md:flex-row gap-4 justify-center items-center no-print">
      <button @click="saveRecord()" class="bg-[#5c3c25] text-[#faf5eb] border-2 border-[#3d2109] px-6 py-3 font-bold rounded-full shadow-[0_4px_0_#3d2109] hover:translate-y-[-2px] active:translate-y-[4px] active:shadow-none transition-all">記録を保存 💾</button>
      <button @click="printMinutes()" class="bg-[#ffde59] text-[#3d2109] border-2 border-[#3d2109] px-6 py-3 font-bold rounded-full shadow-[0_4px_0_#3d2109] hover:translate-y-[-2px] active:translate-y-[4px] active:shadow-none transition-all">PDFを出力 🖨️</button>
      <button @click="copyMeetingMinutes()" class="bg-[#faf5eb] text-[#3d2109] border-2 border-[#3d2109] px-6 py-3 font-bold rounded-full shadow-[0_4px_0_#3d2109] hover:translate-y-[-2px] active:translate-y-[4px] active:shadow-none transition-all">議事録をコピー 📋</button>
    </footer>

    <div x-show="showToast" x-transition class="fixed bottom-6 right-6 z-50 rila-card bg-rila-yellow text-rila-dark px-6 py-3 rounded-2xl flex items-center gap-2 font-black shadow-xl" style="display: none;">
      <span>🐻</span><span x-text="toastMessage"></span>
    </div>
  </div>
</body>
</html>
