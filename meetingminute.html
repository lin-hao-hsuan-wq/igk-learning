  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, collection } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    window.initFirebaseSystem = async function() {
      if (typeof __firebase_config === 'undefined') {
        console.warn("Firebase config not found. Will fallback to LocalStorage for saving.");
        return null;
      }
      try {
        const config = JSON.parse(__firebase_config);
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let user = null;
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
           await signInWithCustomToken(auth, __initial_auth_token);
        } else {
           await signInAnonymously(auth);
        }

        return new Promise((resolve) => {
          onAuthStateChanged(auth, (u) => {
            user = u;
            window.firebaseApp = { db, user, appId };
            resolve(true);
          });
        });
      } catch (e) {
        console.error("Firebase init error:", e);
        return null;
      }
    };

    window.saveRecordToDB = async function(dateStr, data) {
      if (window.firebaseApp && window.firebaseApp.user) {
        const { db, user, appId } = window.firebaseApp;
        try {
          const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'meeting_records', dateStr);
          await setDoc(docRef, data);
          return true;
        } catch(e) {
          console.error("Firebase Save error:", e);
          return false;
        }
      } else {
        localStorage.setItem(`rilakkuma_record_${dateStr}`, JSON.stringify(data));
        return true;
      }
    };

    window.loadRecordFromDB = async function(dateStr) {
      if (window.firebaseApp && window.firebaseApp.user) {
        const { db, user, appId } = window.firebaseApp;
        try {
          const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'meeting_records', dateStr);
          const docSnap = await getDoc(docRef);
          if (docSnap.exists()) {
            return docSnap.data();
          }
        } catch(e) {
          console.error("Firebase Load error:", e);
        }
      } else {
        const localData = localStorage.getItem(`rilakkuma_record_${dateStr}`);
        if (localData) return JSON.parse(localData);
      }
      return null;
    };

    window.translateWithGemini = async function(text) {
      if (!text || text.trim() === '') return { ja: '', en: '' };
      
      let apiKey = localStorage.getItem('gemini_api_key');
      
      if (!apiKey) {
        // 純日/英文的 API Key 詢問視窗
        apiKey = prompt("🐻 自動翻訳には Gemini API Key が必要です！\nAPIキーを入力してください（このPCにのみ保存されます）。\n\nGemini API Key is required for auto-translation!\nPlease enter your API Key (saved locally on this PC only):");
        if (apiKey && apiKey.trim() !== "") {
          localStorage.setItem('gemini_api_key', apiKey.trim());
        } else {
          console.warn("API Key not entered. Skipping translation.");
          throw new Error("API Key cancelled");
        }
      }

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
      const payload = {
          contents: [{ parts: [{ text }] }],
          systemInstruction: { parts: [{ text: "You are a professional translator. Translate the given text into highly natural Japanese and English. Respond ONLY with a valid JSON object in this exact format: {\"ja\": \"[Japanese translation]\", \"en\": \"[English translation]\"}. Do not include markdown code blocks or any other text." }] },
          generationConfig: { responseMimeType: "application/json" }
      };

      try {
          const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'application/json' } });
          if (!res.ok) {
              if (res.status === 400 || res.status === 403) {
                  localStorage.removeItem('gemini_api_key');
                  throw new Error("Invalid API Key");
              }
              throw new Error("API error");
          }
          
          const data = await res.json();
          let jsonStr = data.candidates[0].content.parts[0].text;
          jsonStr = jsonStr.replace(/```json/gi, '').replace(/```/g, '').trim();
          return JSON.parse(jsonStr);
          
      } catch (err) {
          console.error(err);
          throw err;
      }
    };
    
    window.resetApiKey = function() {
        localStorage.removeItem('gemini_api_key');
        // 純日/英文的重設確認視窗
        alert("🐻 API Key を削除しました！次回入力時に再設定してください。\nAPI Key cleared! You will be asked again next time.");
    };
  </script>

    const DEFAULT_MEMBERS = [
      { id: 1, name: 'minori kadono', avatar: 'korilakkuma', status: 'present', report: '', reportJa: '', reportEn: '', isTranslating: false, lastTranslatedText: '' },
      { id: 2, name: 'yuri kato', avatar: 'kiiroitori', status: 'present', report: '', reportJa: '', reportEn: '', isTranslating: false, lastTranslatedText: '' },
      { id: 3, name: 'Yassmyn Khairussalima Ratu', avatar: 'chairoikoguma', status: 'present', report: '', reportJa: '', reportEn: '', isTranslating: false, lastTranslatedText: '' },
      { id: 4, name: 'yoon honey aung', avatar: 'pinksquirrel', status: 'present', report: '', reportJa: '', reportEn: '', isTranslating: false, lastTranslatedText: '' },
      { id: 5, name: '林昊嬛', avatar: 'rilakkuma', status: 'present', report: '', reportJa: '', reportEn: '', isTranslating: false, lastTranslatedText: '' }
    ];

    document.addEventListener('alpine:init', () => {
      Alpine.data('meetingApp', meetingApp);
    });

    function meetingApp() {
      return {
        members: JSON.parse(JSON.stringify(DEFAULT_MEMBERS)),
        announcements: [],
        newMemberName: '',
        newMemberAvatar: 'rilakkuma',
        newAnnouncement: '',
        meetingDate: new Date().toISOString().split('T')[0],
        showToast: false,
        toastMessage: '',
        showAddMemberMenu: false,
        dailyQuote: MOTIVATIONAL_QUOTES[0],

        async init() {
          const daysSinceEpoch = Math.floor(Date.now() / 86400000);
          const quoteIndex = daysSinceEpoch % 100;
          this.dailyQuote = MOTIVATIONAL_QUOTES[quoteIndex];

          if (window.initFirebaseSystem) {
            await window.initFirebaseSystem();
            this.loadRecord(this.meetingDate);
          }

          this.$watch('meetingDate', (newDate) => {
             this.loadRecord(newDate);
          });
        },

        async loadRecord(dateStr) {
          const data = await window.loadRecordFromDB(dateStr);
          if (data) {
            this.members = data.members.map(m => ({
               ...m,
               isTranslating: false,
               lastTranslatedText: m.report
            }));
            this.announcements = data.announcements || [];
            this.triggerToast(`📅 読み込み完了 / Loaded records for ${dateStr}`);
          } else {
            this.members = JSON.parse(JSON.stringify(DEFAULT_MEMBERS));
            this.announcements = [];
          }
        },

        async saveRecord() {
          const dataToSave = {
            members: this.members.map(m => ({
              id: m.id, name: m.name, avatar: m.avatar, status: m.status, 
              report: m.report, reportJa: m.reportJa, reportEn: m.reportEn
            })),
            announcements: this.announcements
          };
          const success = await window.saveRecordToDB(this.meetingDate, dataToSave);
          if (success) {
            this.triggerToast('💾 記録を保存しました / Records successfully saved!');
          } else {
            this.triggerToast('⚠️ 保存に失敗しました / Failed to save records.');
          }
        },

        async autoTranslate(member) {
          const text = member.report.trim();
          if (!text || text === member.lastTranslatedText) return;
          
          member.isTranslating = true;
          try {
            const result = await window.translateWithGemini(text);
            if (result && result.ja && result.en) {
              member.reportJa = result.ja;
              member.reportEn = result.en;
              member.lastTranslatedText = text;
            }
          } catch(e) {
            console.error("Translation failed:", e);
            // 翻譯失敗時，優雅降級：不卡死存檔，只跳出日英雙語提示，保留輸入框讓使用者手動輸入
            if(e.message.includes("cancelled") || e.message.includes("Invalid")) {
                this.triggerToast('⚠️ 自動翻訳スキップ (手動入力可) / Auto-translation skipped (Manual input available) 🐻');
            } else {
                this.triggerToast('⚠️ 翻訳エラー (手動入力可) / Translation Error (Manual input available)');
            }
          }
          member.isTranslating = false;
        },

        getStatusText(status) {
          switch (status) {
            case 'present': return '出席 / Present';
            case 'tardy': return '遅刻 / Late';
            case 'absent': return '欠席 / Absent';
            default: return '出席 / Present';
          }
        },

        cycleStatus(member) {
          if (member.status === 'present') {
            member.status = 'tardy';
          } else if (member.status === 'tardy') {
            member.status = 'absent';
          } else {
            member.status = 'present';
          }
          this.triggerToast(`${member.name} ➡️ ${this.getStatusText(member.status)}`);
        },

        formatDate(dateStr) {
          if (!dateStr) return '';
          const d = new Date(dateStr);
          const year = d.getFullYear();
          const month = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          const weekDays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
          const weekDay = weekDays[d.getDay()];
          return `${year}/${month}/${day} (${weekDay})`;
        },

        addMember() {
          const nameTrimmed = this.newMemberName.trim();
          if (!nameTrimmed) {
            this.triggerToast('⚠️ 名前を入力してください / Please enter a name');
            return;
          }

          let avatar = this.newMemberAvatar;
          if (nameTrimmed === '林昊嬛') {
            avatar = 'rilakkuma';
          }

          this.members.push({
            id: Date.now(),
            name: nameTrimmed,
            avatar: avatar,
            status: 'present',
            report: '',
            reportJa: '',
            reportEn: '',
            isTranslating: false,
            lastTranslatedText: ''
          });

          this.newMemberName = '';
          this.newMemberAvatar = 'rilakkuma';
          this.showAddMemberMenu = false;
          this.triggerToast(`🎉 追加しました / Member Added: ${nameTrimmed}`);
        },

        removeMember(id) {
          this.members = this.members.filter(m => m.id !== id);
          this.triggerToast('🗑️ 削除しました / Removed');
        },

        addAnnouncement() {
          const textTrimmed = this.newAnnouncement.trim();
          if (!textTrimmed) return;
          this.announcements.push({
            id: Date.now(),
            text: textTrimmed,
            completed: false
          });
          this.newAnnouncement = '';
        },

        toggleAnnouncement(id) {
          const item = this.announcements.find(a => a.id === id);
          if (item) {
            item.completed = !item.completed;
          }
        },

        removeAnnouncement(id) {
          this.announcements = this.announcements.filter(a => a.id !== id);
        },

        triggerToast(message) {
          this.toastMessage = message;
          this.showToast = true;
          setTimeout(() => { this.showToast = false; }, 3500);
        },

        copyMeetingMinutes() {
          let text = `🐻【会議議事録 / Meeting Minutes】🍯\n`;
          text += `📅 日付/Date：${this.formatDate(this.meetingDate)}\n`;
          text += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

          text += `📢 【共有事項 / Shared Information】\n`;
          if (this.announcements.length === 0) {
            text += `（特になし / None）\n`;
          } else {
            this.announcements.forEach((ann, idx) => {
              const checkIcon = ann.completed ? '✅' : '📌';
              text += `${idx + 1}. [${checkIcon}] ${ann.text}\n`;
            });
          }
          text += `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

          text += `👥 【個人レポート / Individual Reports】\n`;
          this.members.forEach((m) => {
            const statusLabel = this.getStatusText(m.status);
            text += `👤 ${m.name} (${statusLabel})\n`;
            if (m.status === 'absent') {
              text += `   ↳ 💤 欠席 / Absent\n`;
            } else {
              text += `   ↳ [Original]: ${m.report.trim() ? m.report : '...'}\n`;
              if (m.reportJa) text += `   ↳ [JP]: ${m.reportJa}\n`;
              if (m.reportEn) text += `   ↳ [EN]: ${m.reportEn}\n`;
            }
            text += `\n`;
          });

          text += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
          text += `🧸 ${this.dailyQuote.ja} / ${this.dailyQuote.en}\n`;

          const tempTextarea = document.createElement('textarea');
          tempTextarea.value = text;
          document.body.appendChild(tempTextarea);
          tempTextarea.select();
          try {
            document.execCommand('copy');
            this.triggerToast('📋 議事録をコピーしました / Minutes Copied! 🐻✨');
          } catch (err) {
            this.triggerToast('⚠️ コピー失敗 / Copy Failed');
          }
          document.body.removeChild(tempTextarea);
        },

        printMinutes() {
          window.print();
        },

        resetMeeting() {
          const confirmReset = window.confirm("データをリセットしますか？ / Are you sure you want to reset the meeting records?");
          if (confirmReset) {
            this.announcements = [];
            this.members.forEach(m => {
              m.report = '';
              m.reportJa = '';
              m.reportEn = '';
              m.status = 'present';
            });
            this.triggerToast('🧹 リセット完了 / Reset complete.');
          }
        }
      };
    }
  </script>

                   @keydown.enter="addAnnouncement()"
                   class="flex-1 px-4 py-2 border-2 border-rila-dark rounded-xl focus:outline-none focus:ring-2 focus:ring-rila-brown bg-white text-sm rila-inset-shadow" />
            <button @click="addAnnouncement()" class="bg-rila-yellow hover:bg-yellow-400 border-2 border-rila-dark text-rila-dark font-black px-4 py-2 rounded-xl text-sm transition-colors duration-150 whitespace-nowrap">
              追加 / Add
            </button>
          </div>

          <ul class="space-y-3">
            <template x-for="(ann, index) in announcements" :key="ann.id">
              <li class="flex items-start justify-between bg-rila-light/60 border-2 border-rila-dark/15 p-3 rounded-2xl transition-all duration-150"
                  :class="{'opacity-60 bg-gray-100 line-through decoration-rila-dark decoration-2': ann.completed}">
                <div class="flex items-start gap-3 flex-1">
                  <button @click="toggleAnnouncement(ann.id)" class="mt-0.5 flex-shrink-0 transition-transform duration-100 hover:scale-110">
                    <template x-if="ann.completed">
                      <svg class="w-6 h-6 text-rila-dark" viewBox="0 0 24 24" fill="currentColor">
                        <ellipse cx="12" cy="14" rx="6" ry="5" />
                        <circle cx="6" cy="7" r="2" /><circle cx="10" cy="5" r="2" /><circle cx="14" cy="5" r="2" /><circle cx="18" cy="7" r="2" />
                      </svg>
                    </template>
                    <template x-if="!ann.completed">
                      <svg class="w-6 h-6 text-rila-brown/40 hover:text-rila-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <ellipse cx="12" cy="14" rx="6" ry="5" />
                        <circle cx="6" cy="7" r="2" /><circle cx="10" cy="5" r="2" /><circle cx="14" cy="5" r="2" /><circle cx="18" cy="7" r="2" />
                      </svg>
                    </template>
                  </button>
                  <span class="text-sm font-bold text-rila-dark pt-0.5" x-text="ann.text"></span>
                </div>
                <button @click="removeAnnouncement(ann.id)" class="text-xs text-red-400 hover:text-red-600 ml-2 pt-0.5 no-print">
                  🗑️
                </button>
              </li>
            </template>
            <template x-if="announcements.length === 0">
              <div class="text-center py-6 text-sm text-rila-brown font-bold italic">
                事項はありません / No announcements yet ☕
              </div>
            </template>
          </ul>
        </section>

        <section class="space-y-6">
          <h3 class="text-xl font-black flex items-center gap-2 text-rila-dark border-b-2 border-rila-dark pb-2">
            🍪 個人レポート / Individual Reports
          </h3>

          <div class="space-y-4">
            <template x-for="member in members" :key="member.id">
              <div class="rila-card bg-white rounded-3xl p-5 relative overflow-hidden transition-all duration-200"
                   :class="{'opacity-60 bg-gray-100': member.status === 'absent'}">
                
                <div class="flex items-center justify-between mb-3 border-b border-dashed border-rila-brown/30 pb-2">
                  <div class="flex items-center gap-3">
                    <div class="w-10 h-10">
                      <template x-if="member.avatar === 'rilakkuma'">
                        <svg viewBox="0 0 100 100"><circle cx="20" cy="25" r="15" fill="#c39b62" /><circle cx="20" cy="25" r="9" fill="#FFDE59" /><circle cx="80" cy="25" r="15" fill="#c39b62" /><circle cx="80" cy="25" r="9" fill="#FFDE59" /><ellipse cx="50" cy="55" rx="41" ry="33" fill="#c39b62" /><ellipse cx="50" cy="65" rx="14" ry="10" fill="#FFFFFF" /><path d="M 46 62 Q 50 67 54 62" fill="none" stroke="#3d2109" stroke-width="3" stroke-linecap="round" /><line x1="50" y1="60" x2="50" y2="63" stroke="#3d2109" stroke-width="3" /><circle cx="32" cy="50" r="4.5" fill="#3d2109" /><circle cx="68" cy="50" r="4.5" fill="#3d2109" /></svg>
                      </template>
                      <template x-if="member.avatar === 'korilakkuma'">
                        <svg viewBox="0 0 100 100"><circle cx="20" cy="25" r="15" fill="#faf5eb" stroke="#d5cebf" stroke-width="1" /><circle cx="20" cy="25" r="9" fill="#FF8DA1" /><circle cx="80" cy="25" r="15" fill="#faf5eb" stroke="#d5cebf" stroke-width="1" /><circle cx="80" cy="25" r="9" fill="#FF8DA1" /><ellipse cx="50" cy="55" rx="41" ry="33" fill="#faf5eb" stroke="#d5cebf" stroke-width="1" /><ellipse cx="50" cy="65" rx="14" ry="10" fill="#FFFFFF" /><path d="M 46 62 Q 50 67 54 62" fill="none" stroke="#3d2109" stroke-width="3" stroke-linecap="round" /><line x1="50" y1="60" x2="50" y2="63" stroke="#3d2109" stroke-width="3" /><circle cx="32" cy="50" r="4.5" fill="#3d2109" /><circle cx="68" cy="50" r="4.5" fill="#3d2109" /></svg>
                      </template>
                      <template x-if="member.avatar === 'kiiroitori'">
                        <svg viewBox="0 0 100 100"><path d="M 46 15 Q 46 5 48 8" stroke="#3d2109" stroke-width="4" stroke-linecap="round" fill="none"/><path d="M 54 15 Q 54 5 52 8" stroke="#3d2109" stroke-width="4" stroke-linecap="round" fill="none"/><ellipse cx="50" cy="55" rx="40" ry="35" fill="#FFDE59" /><circle cx="34" cy="50" r="4" fill="#3d2109" /><circle cx="66" cy="50" r="4" fill="#3d2109" /><ellipse cx="50" cy="58" rx="14" ry="8" fill="#FF9900" /><line x1="36" y1="58" x2="64" y2="58" stroke="#3d2109" stroke-width="2" /></svg>
                      </template>
                      <template x-if="member.avatar === 'chairoikoguma'">
                        <svg viewBox="0 0 100 100"><circle cx="20" cy="25" r="15" fill="#5c3c25" /><circle cx="20" cy="25" r="9" fill="#FFFFFF" /><circle cx="80" cy="25" r="15" fill="#5c3c25" /><circle cx="80" cy="25" r="9" fill="#FFFFFF" /><ellipse cx="50" cy="55" rx="41" ry="33" fill="#5c3c25" /><ellipse cx="50" cy="65" rx="14" ry="10" fill="#FFFFFF" /><path d="M 46 62 Q 50 67 54 62" fill="none" stroke="#3d2109" stroke-width="3" stroke-linecap="round" /><line x1="50" y1="60" x2="50" y2="63" stroke="#3d2109" stroke-width="3" /><circle cx="32" cy="50" r="4.5" fill="#3d2109" /><circle cx="68" cy="50" r="4.5" fill="#3d2109" /></svg>
                      </template>
                      <template x-if="member.avatar === 'honeybee'">
                        <svg viewBox="0 0 100 100"><path d="M 35 20 Q 30 5 25 10" stroke="#3d2109" stroke-width="3" fill="none" /><circle cx="25" cy="10" r="4" fill="#FFDE59" /><path d="M 65 20 Q 70 5 75 10" stroke="#3d2109" stroke-width="3" fill="none" /><circle cx="75" cy="10" r="4" fill="#FFDE59" /><circle cx="20" cy="30" r="13" fill="#c39b62" /><circle cx="20" cy="30" r="7" fill="#FFDE59" /><circle cx="80" cy="30" r="13" fill="#c39b62" /><circle cx="80" cy="30" r="7" fill="#FFDE59" /><ellipse cx="50" cy="58" rx="40" ry="30" fill="#c39b62" /><ellipse cx="50" cy="66" rx="13" ry="9" fill="#FFFFFF" /><path d="M 46 63 Q 50 67 54 63" fill="none" stroke="#3d2109" stroke-width="2" /><circle cx="33" cy="52" r="4.5" fill="#3d2109" /><circle cx="67" cy="52" r="4.5" fill="#3d2109" /><ellipse cx="26" cy="61" rx="5" ry="3.5" fill="#FFB7B2" opacity="0.8" /><ellipse cx="74" cy="61" rx="5" ry="3.5" fill="#FFB7B2" opacity="0.8" /></svg>
                      </template>
                      <template x-if="member.avatar === 'pinksquirrel'">
                        <svg viewBox="0 0 100 100"><path d="M 65 65 C 100 70, 100 20, 75 25 C 65 27, 70 45, 65 50" fill="#ffb6c1" stroke="#3d2109" stroke-width="2" /><path d="M 75 35 C 85 30, 85 50, 75 55" fill="none" stroke="#ff8da1" stroke-width="3" stroke-linecap="round" /><path d="M 22 40 Q 15 10 40 22" fill="#ffb6c1" stroke="#3d2109" stroke-width="2" /><path d="M 26 36 Q 20 18 36 24" fill="#ffffff" /><path d="M 78 40 Q 85 10 60 22" fill="#ffb6c1" stroke="#3d2109" stroke-width="2" /><path d="M 74 36 Q 80 18 64 24" fill="#ffffff" /><ellipse cx="50" cy="58" rx="38" ry="30" fill="#ffb6c1" /><ellipse cx="50" cy="65" rx="14" ry="10" fill="#ffffff" /><path d="M 46 62 Q 50 67 54 62" fill="none" stroke="#3d2109" stroke-width="2.5" stroke-linecap="round" /><line x1="50" y1="60" x2="50" y2="63" stroke="#3d2109" stroke-width="2.5" /><circle cx="50" cy="58" r="3.5" fill="#3d2109" /><circle cx="30" cy="52" r="4.5" fill="#3d2109" /><circle cx="70" cy="52" r="4.5" fill="#3d2109" /><ellipse cx="20" cy="60" rx="5" ry="3" fill="#ff8da1" /><ellipse cx="80" cy="60" rx="5" ry="3" fill="#ff8da1" /></svg>
                      </template>
                    </div>
                    <h4 class="font-extrabold text-lg text-rila-dark" x-text="member.name"></h4>
                  </div>

                  <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-rila-brown hidden sm:inline">ステータス:</span>
                    <select x-model="member.status" class="no-print border-2 border-rila-dark rounded-lg px-2 py-0.5 text-xs font-bold bg-[#faf5eb] focus:outline-none">
                      <option value="present">🟢 出席/Present</option>
                      <option value="tardy">🟡 遅刻/Late</option>
                      <option value="absent">🔴 欠席/Absent</option>
                    </select>
                    <span class="hidden print:inline font-bold text-sm" x-text="`[${getStatusText(member.status)}]`"></span>
                  </div>
                </div>

                <div>
                  <template x-if="member.status !== 'absent'">
                    <div>
                      <textarea x-model="member.report" 
                                @blur="autoTranslate(member)"
                                placeholder="進捗やタスクを入力（自動翻訳されます）/ Enter report (auto-translated)... ✍️"
                                rows="2"
                                class="w-full px-4 py-2 border-2 border-rila-dark/30 rounded-2xl focus:border-rila-brown focus:outline-none bg-rila-light/30 rila-inset-shadow text-sm transition-all duration-150"></textarea>
                      
                      <div x-show="member.isTranslating" class="text-xs font-bold text-rila-brown mt-1 animate-pulse flex items-center gap-1">
                        <svg class="animate-spin h-3 w-3 text-rila-brown" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        翻訳中 / Translating...
                      </div>

                      <div class="mt-2 space-y-2 no-print">
                        <div class="bg-[#fcf8f2] p-2.5 rounded-xl border border-rila-brown/30 text-sm flex gap-2 items-center">
                          <span class="font-bold text-xs text-rila-brown whitespace-nowrap">🇯🇵 JA:</span>
                          <input type="text" x-model="member.reportJa" placeholder="（手動入力 / Manual JP Input）" 
                                 class="bg-transparent border-none focus:outline-none focus:ring-1 focus:ring-rila-brown w-full text-rila-dark rounded px-1 transition-all">
                        </div>
                        <div class="bg-[#f2f8fc] p-2.5 rounded-xl border border-[#b2c8d6] text-sm flex gap-2 items-center">
                          <span class="font-bold text-xs text-[#527993] whitespace-nowrap">🇬🇧 EN:</span>
                          <input type="text" x-model="member.reportEn" placeholder="（手動入力 / Manual EN Input）" 
                                 class="bg-transparent border-none focus:outline-none focus:ring-1 focus:ring-[#527993] w-full text-[#2b4151] rounded px-1 transition-all">
                        </div>
                      </div>
                      
                      <div class="hidden print:block mt-2 text-sm text-gray-700">
                        <p x-show="member.reportJa"><strong>JA:</strong> <span x-text="member.reportJa"></span></p>
                        <p x-show="member.reportEn"><strong>EN:</strong> <span x-text="member.reportEn"></span></p>
                      </div>
                    </div>
                  </template>
                  <template x-if="member.status === 'absent'">
                    <div class="py-3 text-center text-sm font-bold text-red-500 italic">
                      欠席 / Absent 💤
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </section>

        <div class="mt-4 border-t-2 border-dashed border-rila-brown/40 pt-8 pb-4 text-center select-none rila-card bg-white rounded-3xl">
          <p class="text-xs font-black text-rila-brown/80 tracking-widest uppercase mb-2 flex items-center justify-center gap-2">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            本日の名言 / Today's Quote
          </p>
          <p class="text-lg font-black text-rila-dark px-4" x-text="dailyQuote.ja"></p>
          <p class="text-sm font-bold text-rila-brown mt-1 px-4" x-text="dailyQuote.en"></p>
        </div>
      </main>
      
    </div>

    <footer class="mt-12 flex flex-col md:flex-row gap-4 justify-center items-center no-print">
      <button @click="saveRecord()" class="bear-btn bear-btn-koguma bear-btn-koguma-ear-inner px-6 py-3 text-sm md:text-base shadow-lg w-full md:w-auto">
        記録を保存 / Save Record 💾
      </button>

      <button @click="printMinutes()" class="bear-btn bear-btn-rila-ear-inner px-6 py-3 text-sm md:text-base shadow-lg w-full md:w-auto">
        PDFを出力 / Print PDF 🖨️
      </button>

      <button @click="copyMeetingMinutes()" class="bear-btn bear-btn-kori bear-btn-kori-ear-inner px-6 py-3 text-sm md:text-base shadow-lg border-gray-400 w-full md:w-auto">
        議事録をコピー / Copy 📋
      </button>

      <button @click="resetMeeting()" class="bear-btn bear-btn-kori bear-btn-kori-ear-inner px-6 py-3 text-sm md:text-base shadow-lg text-red-500 border-red-400 w-full md:w-auto">
        リセット / Reset 🧹
      </button>
      
      <button onclick="window.resetApiKey()" class="text-xs text-rila-brown underline mt-2 md:mt-0 md:ml-4 hover:text-rila-dark">
        API Key を変更 / Change API Key
      </button>
    </footer>

    <div x-show="showToast" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 transform translate-y-4"
         x-transition:enter-end="opacity-100 transform translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 transform translate-y-0"
         x-transition:leave-end="opacity-0 transform translate-y-4"
         class="fixed bottom-6 right-6 z-50 rila-card bg-rila-yellow text-rila-dark px-6 py-3 rounded-2xl flex items-center gap-2 font-black shadow-xl"
         style="display: none;">
      <span>🐻</span>
      <span x-text="toastMessage"></span>
    </div>

  </div>
</body>
</html>
