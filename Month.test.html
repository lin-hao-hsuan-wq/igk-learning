<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGK 5-Day Record System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .print-btn-container {
            text-align: right;
            margin-bottom: 20px;
        }
        .btn-print {
            width: auto;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #2ecc71;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-print:hover { background-color: #27ae60; }

        .logo {
            text-align: center;
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--primary-color);
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-color);
            margin: 35px 0 15px 0;
        }
        h2 span {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 20px;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            background: #f1f5f9;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 8px;
            display: block;
        }
        label span {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
        }

        select, input, button {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background-color: white;
        }

        button.btn-save {
            background-color: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 700;
            margin-top: 20px;
            height: 48px;
        }
        button.btn-save:hover { background-color: #2980b9; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th, td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f8fafc;
            color: var(--primary-color);
            font-weight: 600;
            font-size: 14px;
        }
        th span {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .charts-wrapper {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .chart-box {
            flex: 1;
            min-width: 450px;
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            box-sizing: border-box;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .chart-title { font-weight: 700; color: var(--primary-color); font-size: 16px; }
        .chart-title span { display: block; font-size: 11px; color: var(--text-muted); font-weight: 400; }
        .chart-container { height: 280px; width: 100%; position: relative; }

        .motivation-box {
            margin-top: 40px;
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 12px;
        }

        .motivation-en { font-size: 18px; font-weight: 700; color: var(--primary-color); font-style: italic; margin-bottom: 10px; }
        .motivation-jp { font-size: 15px; color: var(--text-muted); }

        /* ================= 🖨️ A4 Print Styles ================= */
        @media print {
            @page {
                size: A4 portrait;
                margin: 1.5cm;
            }
            body {
                background: white !important;
                color: #000 !important;
                padding: 0 !important;
            }
            .container {
                box-shadow: none !important;
                padding: 0 !important;
                max-width: 100% !important;
            }
            .print-btn-container, 
            h2:nth-of-type(1), 
            .form-group {
                display: none !important;
            }
            th { background-color: #f1f5f9 !important; color: #000 !important; }
            td, th { border: 1px solid #cbd5e1 !important; padding: 10px !important; }
            
            .charts-wrapper {
                display: flex !important;
                flex-direction: row !important;
                gap: 15px !important;
                flex-wrap: nowrap !important;
            }
            .chart-box {
                flex: 1 !important;
                min-width: 0 !important;
                border: 1px solid #cbd5e1 !important;
                padding: 10px !important;
            }
            #chartUserSelect {
                display: none !important;
            }
            .motivation-box {
                background: #f8fafc !important;
                border: 1px solid #e2e8f0 !important;
                margin-top: 30px !important;
                padding: 15px !important;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="print-btn-container">
        <button class="btn-print" onclick="window.print()">🖨️ Print / Save as PDF</button>
    </div>

    <div class="logo">IGK</div>

    <h2>📊 Daily Data Entry <span>毎日のデータ入力</span></h2>
    <div class="form-group">
        <div>
            <label>Member Name <span>メンバー名</span></label>
            <select id="userSelect"></select>
        </div>
        <div>
            <label>Record Date <span>記録日 (最終週)</span></label>
            <select id="dateSelect"></select>
        </div>
        <div>
            <label>Correct Answers (0-20) <span>正解数 (0-20題)</span></label>
            <input type="number" id="scoreInput" min="0" max="20" value="0">
        </div>
        <div>
            <button class="btn-save" onclick="saveData()">Save Record<br><span style="font-size:10px; font-weight:400; display:block; margin-top:-2px;">データを保存</span></button>
        </div>
    </div>

    <h2>📋 Weekly Overview <span>今週のデータ概要</span></h2>
    <table id="dailySummaryTable">
        <thead>
            <tr>
                <th>Date <span>日付</span></th>
                <th>Total Participants <span>参加人数</span></th>
                <th>Highest Score (Max 20) <span>最高得点 (20題中)</span></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="charts-wrapper">
        <div class="chart-box">
            <div class="chart-header">
                <div class="chart-title">📊 Overall Team Progress <span>全体平均の推移</span></div>
            </div>
            <div class="chart-container">
                <canvas id="overallChart"></canvas>
            </div>
        </div>

        <div class="chart-box">
            <div class="chart-header">
                <div class="chart-title">👤 Individual Performance <span>個人スコアの傾向</span></div>
                <select id="chartUserSelect" onchange="updateCharts()" style="width: 120px; padding: 5px; font-size: 13px;"></select>
            </div>
            <div class="chart-container">
                <canvas id="personalChart"></canvas>
            </div>
        </div>
    </div>

    <div class="motivation-box">
        <div class="motivation-en">"Consistency is the key to mastery."</div>
        <div class="motivation-jp">「継続こそが、卓越した技術への唯一の道です。」</div>
    </div>
</div>

<script>
    // 1. Members List & Sorting
    const rawUsers = [
        "Soma", "Kosei", "Minato", "Sumire", "Ayata", "Rito", "Kanata", 
        "Taishin", "Hina", "Soichi", "Tamaki", "Yushi", "Sohjiroh", 
        "Risa", "Ukyo", "Takumi", "Shiori", "Koharu"
    ];
    const users = rawUsers.sort((a, b) => a.localeCompare(b));

    const userSelect = document.getElementById('userSelect');
    const chartUserSelect = document.getElementById('chartUserSelect');
    
    users.forEach(user => {
        userSelect.add(new Option(user, user));
        chartUserSelect.add(new Option(user, user));
    });

    // 2. Automatically Calculate Last Week of the Month
    function getLastWeekDays() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth(); 
        const lastDayOfMonth = new Date(year, month + 1, 0);
        const lastDate = lastDayOfMonth.getDate();
        const lastDayOfWeek = lastDayOfMonth.getDay(); 
        
        let lastFriday;
        if (lastDayOfWeek >= 5) {
            lastFriday = new Date(year, month, lastDate - (lastDayOfWeek - 5));
        } else {
            lastFriday = new Date(year, month, lastDate - (lastDayOfWeek + 2));
        }
        
        const dates = [];
        for (let i = 4; i >= 0; i--) {
            let d = new Date(lastFriday);
            d.setDate(lastFriday.getDate() - i);
            dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
        }
        return dates;
    }

    const lastWeekDates = getLastWeekDays();
    const dateSelect = document.getElementById('dateSelect');
    lastWeekDates.forEach(date => dateSelect.add(new Option(date, date)));

    // 3. Data Storage & Management
    let recordData = JSON.parse(localStorage.getItem('igk_records')) || {};

    function saveData() {
        const user = userSelect.value;
        const date = dateSelect.value;
        const score = parseInt(document.getElementById('scoreInput').value);

        // Bilingual Alert Messages
        if (score < 0 || score > 20 || isNaN(score)) {
            alert("⚠️ Please enter a score between 0 and 20.\n0から20の間の数値を入力してください。");
            return;
        }

        if (!recordData[user]) recordData[user] = {};
        recordData[user][date] = score;

        localStorage.setItem('igk_records', JSON.stringify(recordData));
        
        renderSummaryTable();
        updateCharts();
        alert(`✅ Record saved successfully for ${user}!\n${user} のデータが正常に保存されました！`);
    }

    function renderSummaryTable() {
        const tbody = document.getElementById('dailySummaryTable').querySelector('tbody');
        tbody.innerHTML = '';

        lastWeekDates.forEach(date => {
            let count = 0, max = 0, hasData = false;
            for (let u in recordData) {
                if (recordData[u][date] !== undefined) {
                    count++;
                    hasData = true;
                    if (recordData[u][date] > max) max = recordData[u][date];
                }
            }
            tbody.innerHTML += `<tr><td>${date}</td><td>${count} Ppl / 人</td><td>${hasData ? max + ' Qs / 題' : '-'}</td></tr>`;
        });
    }

    // 4. Chart Render Configurations
    let overallChart, personalChart;

    function updateCharts() {
        const avgScores = lastWeekDates.map(date => {
            let total = 0, count = 0;
            for (let u in recordData) {
                if (recordData[u][date] !== undefined) {
                    total += recordData[u][date];
                    count++;
                }
            }
            return count > 0 ? (total / count).toFixed(1) : null;
        });

        const currentUser = chartUserSelect.value;
        const userScores = lastWeekDates.map(date => 
            (recordData[currentUser] && recordData[currentUser][date] !== undefined) ? recordData[currentUser][date] : null
        );

        const ctxOverall = document.getElementById('overallChart').getContext('2d');
        const ctxPersonal = document.getElementById('personalChart').getContext('2d');

        if (overallChart) overallChart.destroy();
        if (personalChart) personalChart.destroy();

        // Chart Text Configuration (Bilingual)
        overallChart = new Chart(ctxOverall, {
            type: 'bar',
            data: {
                labels: lastWeekDates.map(d => d.slice(5)), 
                datasets: [{
                    label: 'Team Avg / 全体平均',
                    data: avgScores,
                    backgroundColor: 'rgba(52, 152, 219, 0.4)',
                    borderColor: '#3498db',
                    borderWidth: 1
                }]
            },
            options: chartOptions(20, 'Avg Score / 平均正解数')
        });

        personalChart = new Chart(ctxPersonal, {
            type: 'line',
            data: {
                labels: lastWeekDates.map(d => d.slice(5)),
                datasets: [{
                    label: `${currentUser}'s Score / スコア`,
                    data: userScores,
                    borderColor: '#2c3e50',
                    borderWidth: 3,
                    pointRadius: 5,
                    fill: false,
                    tension: 0.3
                }]
            },
            options: chartOptions(20, 'Score / 正解数')
        });
    }

    function chartOptions(max, yLabel) {
        return {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { min: 0, max: max, ticks: { stepSize: 2 }, title: { display: true, text: yLabel, font: { size: 11 } } }
            },
            plugins: { legend: { display: false } }
        };
    }

    renderSummaryTable();
    updateCharts();
</script>

</body>
</html>
