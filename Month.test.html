<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGK 5-Day Record System (Print Optimized)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-print { background-color: #2ecc71; color: white; }
        .btn-print:hover { background-color: #27ae60; }
        
        .btn-print-all { background-color: #f1c40f; color: #2c3e50; }
        .btn-print-all:hover { background-color: #f39c12; color: white; }

        .btn-sync { background-color: #f39c12; color: white; }
        .btn-sync:hover { background-color: #d35400; }

        .logo {
            text-align: center;
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--primary-color);
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-color);
            margin: 35px 0 15px 0;
        }
        h2 span {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 5px;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            background: #f1f5f9;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 8px;
            display: block;
        }
        label span {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
        }

        select, input, button {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background-color: white;
            box-sizing: border-box;
        }

        button.btn-save {
            background-color: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 700;
            margin-top: 20px;
            height: 48px;
        }
        button.btn-save:hover { background-color: #2980b9; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th, td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f8fafc;
            color: var(--primary-color);
            font-weight: 600;
            font-size: 14px;
        }
        th span {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .btn-action {
            padding: 6px 12px;
            background-color: #e2e8f0;
            color: var(--primary-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        .btn-action:hover { background-color: #cbd5e1; }

        .charts-wrapper {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .chart-box {
            flex: 1;
            min-width: 450px;
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            box-sizing: border-box;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .chart-title { font-weight: 700; color: var(--primary-color); font-size: 16px; }
        .chart-title span { display: block; font-size: 11px; color: var(--text-muted); font-weight: 400; }
        .chart-container { height: 280px; width: 100%; position: relative; }

        .motivation-box {
            margin-top: 40px;
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 12px;
        }

        .motivation-en { font-size: 18px; font-weight: 700; color: var(--primary-color); font-style: italic; margin-bottom: 10px; }
        .motivation-jp { font-size: 15px; color: var(--text-muted); }

        /* ================= 🖨️ Print Area Elements ================= */
        .print-header {
            display: none;
            border-bottom: 2px dashed var(--primary-color);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        .print-header-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .print-name { font-size: 20px; font-weight: 700; color: var(--primary-color); }
        .print-date { font-size: 12px; color: var(--text-muted); }
        .print-quote { font-size: 12px; font-style: italic; color: #34495e; margin-top: 4px; }

        #printAllContainer { display: none; }
        
        .chart-print-img {
            display: none; 
            width: 100%;
            height: auto;
        }

        /* ================= 🛑 Custom Modal for Data Management ================= */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .modal-title { font-weight: 700; font-size: 18px; color: var(--primary-color); }
        .close-modal { font-size: 24px; cursor: pointer; color: var(--text-muted); }
        .close-modal:hover { color: black; }
        .detail-list { max-height: 300px; overflow-y: auto; margin-bottom: 15px; }
        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #f1f5f9;
        }
        .btn-delete {
            background-color: #ff7675;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-delete:hover { background-color: #d63031; }

        /* ================= 🖨️ A4 嚴格單頁不溢出樣式修復 ================= */
        @media print {
            @page { 
                size: A4 portrait; 
                margin: 0.8cm 1.0cm; /* 上下縮減邊距確保不換頁 */
            }
            body { 
                background: white !important; 
                color: #000 !important; 
                padding: 0 !important; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important;
            }
            .container { display: none !important; } 
            
            #printAllContainer { 
                display: block !important; 
                width: 100% !important;
            }
            
            .print-page {
                page-break-inside: avoid !important; /* 絕對嚴禁內部拆頁 */
                page-break-after: always !important; /* 每人強迫換新頁 */
                box-sizing: border-box;
                width: 100% !important;
                padding: 0;
                margin: 0 0 20px 0;
            }
            .print-page:last-child {
                page-break-after: avoid !important;
            }

            .print-header { display: block !important; }
            
            h2 { font-size: 14px !important; margin: 12px 0 6px 0 !important; }
            h2 span { font-size: 10px !important; display: inline-block !important; margin-left: 4px; }

            th { background-color: #f1f5f9 !important; color: #000 !important; font-size: 11px !important; }
            td, th { border: 1px solid #cbd5e1 !important; padding: 5px !important; font-size: 11px !important; }
            table { margin-bottom: 10px !important; }
            
            .charts-wrapper { 
                display: flex !important; 
                flex-direction: row !important; 
                gap: 10px !important; 
                flex-wrap: nowrap !important; 
                margin-top: 5px !important;
                margin-bottom: 10px !important;
            }
            .chart-box { 
                flex: 1 !important; 
                min-width: 0 !important; 
                border: 1px solid #cbd5e1 !important; 
                padding: 6px !important; 
                background: white !important;
                border-radius: 6px !important;
            }
            .chart-title { font-size: 12px !important; }
            .chart-title span { display: inline-block !important; font-size: 9px !important; margin-left: 3px; }
            
            .chart-container {
                height: 180px !important; /* 🔥 降低高度確保塞進A4 */
                width: 100% !important;
            }

            .chart-print-img {
                display: block !important; 
                max-width: 100% !important;
                height: 180px !important; /* 強制圖片吻合高度 */
                object-fit: contain;
            }
            
            .motivation-box { 
                background: #f8fafc !important; 
                border: 1px solid #e2e8f0 !important; 
                margin-top: 5px !important; 
                padding: 8px !important; 
                border-radius: 6px !important;
            }
            .motivation-en { font-size: 12px !important; margin-bottom: 2px !important; }
            .motivation-jp { font-size: 10px !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div>
            <label style="display:inline-block; margin-right: 10px; margin-bottom:0;">Target Month <span>対象月</span></label>
            <select id="monthSelect" onchange="handleMonthChange()" style="width: 160px; display:inline-block; padding: 6px; font-size: 14px;"></select>
        </div>
        <div class="btn-group">
            <button class="btn btn-sync" onclick="exportData()">📤 Export Data</button>
            <button class="btn btn-sync" onclick="importData()">📥 Import Data</button>
            <button class="btn btn-print-all" onclick="printAllMembers()">🌟 Print All Members</button>
            <button class="btn btn-print" onclick="printCurrentMember()">🖨️ Print Single</button>
        </div>
    </div>

    <div class="logo">IGK</div>

    <h2>📊 Daily Data Entry <span>毎日のデータ入力</span></h2>
    <div class="form-group">
        <div>
            <label>Member Name <span>メンバー名</span></label>
            <select id="userSelect"></select>
        </div>
        <div>
            <label>Record Date <span>記録日 (最終週)</span></label>
            <select id="dateSelect"></select>
        </div>
        <div>
            <label>Correct Answers (0-20) <span>正解数 (0-20題)</span></label>
            <input type="number" id="scoreInput" min="0" max="20" value="0">
        </div>
        <div>
            <button class="btn-save" onclick="saveData()">Save Record<br><span style="font-size:10px; font-weight:400; display:block; margin-top:-2px;">データを保存</span></button>
        </div>
    </div>

    <h2>📋 Weekly Overview <span>今週のデータ概要</span></h2>
    <table id="dailySummaryTable">
        <thead>
            <tr>
                <th>Date <span>日付</span></th>
                <th>Total Participants <span>参加人数</span></th>
                <th>Highest Score (Max 20) <span>最高得点 (20題中)</span></th>
                <th>Action <span>操作</span></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="charts-wrapper">
        <div class="chart-box">
            <div class="chart-header">
                <div class="chart-title">📊 Overall Team Progress <span>全体平均の推移</span></div>
            </div>
            <div class="chart-container">
                <canvas id="overallChart"></canvas>
            </div>
        </div>

        <div class="chart-box">
            <div class="chart-header">
                <div class="chart-title">👤 Individual Performance <span>個人スコアの傾向</span></div>
                <select id="chartUserSelect" onchange="updateCharts()" style="width: 120px; padding: 5px; font-size: 13px;"></select>
            </div>
            <div class="chart-container">
                <canvas id="personalChart"></canvas>
            </div>
        </div>
    </div>

    <div class="motivation-box">
        <div class="motivation-en">"Consistency is the key to mastery."</div>
        <div class="motivation-jp">「継続こそが、卓越した技術への唯一の道です。」</div>
    </div>
</div>

<div id="printAllContainer"></div>

<div id="dataModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">Manage Data</div>
            <span class="close-modal" onclick="closeModal()">&times;</span>
        </div>
        <div class="detail-list" id="modalList"></div>
        <button onclick="closeModal()" style="background-color: var(--primary-color); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold;">Close / 閉じる</button>
    </div>
</div>

<script>
    let overallChart, personalChart;
    let recordData = JSON.parse(localStorage.getItem('igk_records_v2')) || {};

    const rawUsers = [
        "Soma", "Kosei", "Minato", "Sumire", "Ayata", "Rito", "Kanata", 
        "Taishin", "Hina", "Soichi", "Tamaki", "Yushi", "Sohjiroh", 
        "Risa", "Ukyo", "Takumi", "Shiori", "Koharu", "Takuto", "Aqeel", "Ryuya"
    ];
    const users = rawUsers.sort((a, b) => a.localeCompare(b));

    const userSelect = document.getElementById('userSelect');
    const chartUserSelect = document.getElementById('chartUserSelect');
    
    users.forEach(user => {
        userSelect.add(new Option(user, user));
        chartUserSelect.add(new Option(user, user));
    });

    const monthSelect = document.getElementById('monthSelect');
    function initMonthSelector() {
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth(); 

        for(let i = -5; i <= 6; i++) {
            let d = new Date(currentYear, currentMonth + i, 1);
            let y = d.getFullYear();
            let m = String(d.getMonth() + 1).padStart(2, '0');
            let val = `${y}-${m}`;
            let text = `${y}年 ${m}月`;
            let option = new Option(text, val);
            if(i === 0) option.selected = true;
            monthSelect.add(option);
        }
    }
    initMonthSelector();

    let lastWeekDates = [];
    function updateLastWeekDays() {
        const [yearStr, monthStr] = monthSelect.value.split('-');
        const year = parseInt(yearStr);
        const month = parseInt(monthStr) - 1; 
        
        const lastDayOfMonth = new Date(year, month + 1, 0);
        const lastDate = lastDayOfMonth.getDate();
        const lastDayOfWeek = lastDayOfMonth.getDay(); 
        
        let lastFriday;
        if (lastDayOfWeek >= 5) {
            lastFriday = new Date(year, month, lastDate - (lastDayOfWeek - 5));
        } else {
            lastFriday = new Date(year, month, lastDate - (lastDayOfWeek + 2));
        }
        
        lastWeekDates = [];
        for (let i = 4; i >= 0; i--) {
            let d = new Date(lastFriday);
            d.setDate(lastFriday.getDate() - i);
            lastWeekDates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
        }

        const dateSelect = document.getElementById('dateSelect');
        dateSelect.innerHTML = '';
        lastWeekDates.forEach(date => dateSelect.add(new Option(date, date)));
    }

    function handleMonthChange() {
        updateLastWeekDays();
        renderSummaryTable();
        updateCharts();
    }

    function saveData() {
        const user = userSelect.value;
        const date = dateSelect.value;
        const score = parseInt(document.getElementById('scoreInput').value);
        const selectedMonth = monthSelect.value;

        if (score < 0 || score > 20 || isNaN(score)) {
            alert("⚠️ Please enter a score between 0 and 20.\n0から20の間の数値を入力してください。");
            return;
        }

        if (!recordData[selectedMonth]) recordData[selectedMonth] = {};
        if (!recordData[selectedMonth][user]) recordData[selectedMonth][user] = {};
        
        recordData[selectedMonth][user][date] = score;
        localStorage.setItem('igk_records_v2', JSON.stringify(recordData));
        
        renderSummaryTable();
        updateCharts();
        alert(`✅ Record saved successfully for ${user}!\n${user}のデータが正常に保存されました！`);
    }

    function renderSummaryTable() {
        const tbody = document.getElementById('dailySummaryTable').querySelector('tbody');
        tbody.innerHTML = '';
        const selectedMonth = monthSelect.value;
        const monthData = recordData[selectedMonth] || {};

        lastWeekDates.forEach(date => {
            let count = 0, max = 0, hasData = false;
            for (let u in monthData) {
                if (monthData[u][date] !== undefined) {
                    count++;
                    hasData = true;
                    if (monthData[u][date] > max) max = monthData[u][date];
                }
            }
            tbody.innerHTML += `
                <tr>
                    <td>${date}</td>
                    <td>${count} Ppl / 人</td>
                    <td>${hasData ? max + ' Qs / 題' : '-'}</td>
                    <td><button class="btn-action" onclick="openManageModal('${date}')">🔍 View / Edit</button></td>
                </tr>`;
        });
    }

    function openManageModal(date) {
        const selectedMonth = monthSelect.value;
        const monthData = recordData[selectedMonth] || {};
        
        document.getElementById('modalTitle').innerText = `📅 Manage Data: ${date}`;
        const listContainer = document.getElementById('modalList');
        listContainer.innerHTML = '';

        let hasData = false;
        for (let user in monthData) {
            if (monthData[user][date] !== undefined) {
                hasData = true;
                const score = monthData[user][date];
                listContainer.innerHTML += `
                    <div class="detail-item">
                        <span><strong>${user}</strong>: ${score} Qs / 題</span>
                        <button class="btn-delete" onclick="deleteSingleRecord('${selectedMonth}', '${user}', '${date}')">🗑️ Delete</button>
                    </div>`;
            }
        }

        if (!hasData) {
            listContainer.innerHTML = '<p style="text-align:center; color:var(--text-muted);">No records found for this day.<br>この日のデータはありません。</p>';
        }

        document.getElementById('dataModal').style.display = 'flex';
    }

    function deleteSingleRecord(month, user, date) {
        if (confirm(`Are you sure you want to delete the record for ${user} on ${date}?\n${user}（${date}）のデータを削除してもよろしいですか？`)) {
            if (recordData[month] && recordData[month][user]) {
                delete recordData[month][user][date];
                if (Object.keys(recordData[month][user]).length === 0) {
                    delete recordData[month][user];
                }
                localStorage.setItem('igk_records_v2', JSON.stringify(recordData));
                renderSummaryTable();
                updateCharts();
                openManageModal(date); 
            }
        }
    }

    function closeModal() {
        document.getElementById('dataModal').style.display = 'none';
    }

    function getChartData() {
        const selectedMonth = monthSelect.value;
        const monthData = recordData[selectedMonth] || {};

        const avgScores = lastWeekDates.map(date => {
            let total = 0, count = 0;
            for (let u in monthData) {
                if (monthData[u][date] !== undefined) {
                    total += monthData[u][date];
                    count++;
                }
            }
            return count > 0 ? (total / count).toFixed(1) : null;
        });

        const currentUser = chartUserSelect.value;
        const userScores = lastWeekDates.map(date => 
            (monthData[currentUser] && monthData[currentUser][date] !== undefined) ? monthData[currentUser][date] : null
        );

        return { avgScores, userScores, currentUser };
    }

    function updateCharts() {
        const { avgScores, userScores } = getChartData();
        const ctxOverall = document.getElementById('overallChart').getContext('2d');
        const ctxPersonal = document.getElementById('personalChart').getContext('2d');

        if (overallChart) overallChart.destroy();
        if (personalChart) personalChart.destroy();

        overallChart = new Chart(ctxOverall, {
            type: 'bar',
            data: {
                labels: lastWeekDates.map(d => d.slice(5)), 
                datasets: [{
                    label: 'Team Avg',
                    data: avgScores,
                    backgroundColor: 'rgba(52, 152, 219, 0.4)',
                    borderColor: '#3498db',
                    borderWidth: 1
                }]
            },
            options: chartOptions(20, 'Avg Score', false) 
        });

        personalChart = new Chart(ctxPersonal, {
            type: 'line',
            data: {
                labels: lastWeekDates.map(d => d.slice(5)),
                datasets: [{
                    label: `Score`,
                    data: userScores,
                    borderColor: '#2c3e50',
                    borderWidth: 1,
                    pointRadius: 4,
                    fill: false,
                    tension: 0.3
                }]
            },
            options: chartOptions(20, 'Score', false)
        });
    }

    function chartOptions(max, yLabel, animate = false) {
        return {
            responsive: true,
            maintainAspectRatio: false,
            animation: animate, 
            scales: {
                y: { min: 0, max: max, ticks: { stepSize: 2 }, title: { display: true, text: yLabel, font: { size: 11 } } }
            },
            plugins: { legend: { display: false } }
        };
    }

    // ================= 🖨️ ADVANCED PRINT GENERATOR =================
    
    // 🔥 終極核心修復：使用純記憶體中的非掛載 Canvas 繪製，並等待 Image 觸發 onload 完成才放行 Promise
    function createHiddenChartAndCapture(imgId, config) {
        return new Promise((resolve) => {
            // 建立一個完全與外層 CSS 無關的獨立 Canvas
            const hiddenCanvas = document.createElement('canvas');
            hiddenCanvas.width = 500;
            hiddenCanvas.height = 240;
            
            config.options = config.options || {};
            config.options.responsive = false; 
            config.options.maintainAspectRatio = true;
            config.options.animation = {
                duration: 0, 
                onComplete: function() {
                    const img = document.getElementById(imgId);
                    if (img) {
                        // 🔥 監聽圖片真正的 onload 解碼事件，完全載入後才 resolve
                        img.onload = () => {
                            resolve();
                        };
                        img.onerror = () => {
                            resolve(); // 避免崩潰
                        };
                        img.src = this.toBase64Image();
                    } else {
                        resolve();
                    }
                    this.destroy(); 
                }
            };
            
            new Chart(hiddenCanvas.getContext('2d'), config);
        });
    }

    function generateSummaryHtml(monthData) {
        let tableRowsHtml = '';
        lastWeekDates.forEach(date => {
            let count = 0, max = 0, hasData = false;
            for (let u in monthData) {
                if (monthData[u][date] !== undefined) {
                    count++;
                    hasData = true;
                    if (monthData[u][date] > max) max = monthData[u][date];
                }
            }
            tableRowsHtml += `
                <tr>
                    <td>${date}</td>
                    <td>${count} Ppl / 人</td>
                    <td>${hasData ? max + ' Qs / 題' : '-'}</td>
                </tr>`;
        });
        return tableRowsHtml;
    }

    const targetMonthFormatted = () => monthSelect.options[monthSelect.selectedIndex].text;
    const commonMotivationHtml = `
        <div class="motivation-box">
            <div class="motivation-en">"Consistency is the key to mastery."</div>
            <div class="motivation-jp">「継続こそが、卓越した技術への唯一の道です。」</div>
        </div>
    `;

    function renderPrintPageSkeleton(user, index, summaryRowsHtml) {
        return `
            <div class="print-page">
                <div class="print-header">
                    <div class="print-header-top">
                        <div class="print-name">👤 Member Name: ${user}</div>
                        <div class="print-date">Target Period: ${targetMonthFormatted()}</div>
                    </div>
                    <div class="print-quote">"Consistency is the key to mastery. / 継続こそが、卓越した技術への唯一の道です。"</div>
                </div>

                <h2>📋 Weekly Overview <span>今週のデータ概要</span></h2>
                <table>
                    <thead>
                        <tr>
                            <th>Date <span>日付</span></th>
                            <th>Total Participants <span>参加人数</span></th>
                            <th>Highest Score (Max 20) <span>最高得点 (20題中)</span></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${summaryRowsHtml}
                    </tbody>
                </table>

                <div class="charts-wrapper">
                    <div class="chart-box">
                        <div class="chart-title">📊 Overall Team Progress <span>全体平均の推移</span></div>
                        <div class="chart-container">
                            <img id="print-overall-img-${index}" class="chart-print-img" src="" alt="Team Chart">
                        </div>
                    </div>
                    <div class="chart-box">
                        <div class="chart-title">👤 Individual Performance <span>個人スコアの傾向</span></div>
                        <div class="chart-container">
                            <img id="print-personal-img-${index}" class="chart-print-img" src="" alt="Individual Chart">
                        </div>
                    </div>
                </div>
                ${commonMotivationHtml}
            </div>
        `;
    }

    async function printCurrentMember() {
        const singleUser = chartUserSelect.value;
        const container = document.getElementById('printAllContainer');
        const selectedMonth = monthSelect.value;
        const monthData = recordData[selectedMonth] || {};
        const { avgScores, userScores } = getChartData();

        container.innerHTML = renderPrintPageSkeleton(singleUser, 0, generateSummaryHtml(monthData));

        // 嚴格非同步等待圖片完全 decode 完畢
        await createHiddenChartAndCapture('print-overall-img-0', {
            type: 'bar',
            data: {
                labels: lastWeekDates.map(d => d.slice(5)),
                datasets: [{
                    data: avgScores,
                    backgroundColor: 'rgba(52, 152, 219, 0.4)',
                    borderColor: '#3498db',
                    borderWidth: 1
                }]
            },
            options: chartOptions(20, 'Avg Score', false)
        });

        await createHiddenChartAndCapture('print-personal-img-0', {
            type: 'line',
            data: {
                labels: lastWeekDates.map(d => d.slice(5)),
                datasets: [{
                    data: userScores,
                    borderColor: '#2c3e50',
                    borderWidth: 1,
                    pointRadius: 3,
                    fill: false,
                    tension: 0.3
                }]
            },
            options: chartOptions(20, 'Score', false)
        });

        // 圖片完全就緒，喚醒列印
        window.print();
    }

    async function printAllMembers() {
        if (!confirm(`Generating print preview for all ${users.length} members. This may take a few seconds.\n全${users.length}名分の列印預覽生成中。數秒かかります。`)) return;

        const container = document.getElementById('printAllContainer');
        container.innerHTML = ''; 
        
        const selectedMonth = monthSelect.value;
        const monthData = recordData[selectedMonth] || {};
        const summaryRowsHtml = generateSummaryHtml(monthData);

        const avgScores = lastWeekDates.map(date => {
            let total = 0, count = 0;
            for (let u in monthData) {
                if (monthData[u][date] !== undefined) {
                    total += monthData[u][date];
                    count++;
                }
            }
            return count > 0 ? (total / count).toFixed(1) : null;
        });

        let massiveHtml = '';
        users.forEach((user, index) => {
            massiveHtml += renderPrintPageSkeleton(user, index, summaryRowsHtml);
        });
        container.innerHTML = massiveHtml;

        // 依序同步等待每張圖表的圖片 decode
        for (let index = 0; index < users.length; index++) {
            const user = users[index];
            const userScores = lastWeekDates.map(date => 
                (monthData[user] && monthData[user][date] !== undefined) ? monthData[user][date] : null
            );

            await createHiddenChartAndCapture(`print-overall-img-${index}`, {
                type: 'bar',
                data: {
                    labels: lastWeekDates.map(d => d.slice(5)),
                    datasets: [{
                        data: avgScores,
                        backgroundColor: 'rgba(52, 152, 219, 0.4)',
                        borderColor: '#3498db',
                        borderWidth: 1
                    }]
                },
                options: chartOptions(20, 'Avg Score', false)
            });

            await createHiddenChartAndCapture(`print-personal-img-${index}`, {
                type: 'line',
                data: {
                    labels: lastWeekDates.map(d => d.slice(5)),
                    datasets: [{
                        data: userScores,
                        borderColor: '#2c3e50',
                        borderWidth: 1,
                        pointRadius: 3,
                        fill: false,
                        tension: 0.3
                    }]
                },
                options: chartOptions(20, 'Score', false)
            });
        }

        // 所有人都處理完了，直接安全呼叫
        window.print();
    }

    function exportData() {
        const dataStr = JSON.stringify(recordData);
        const tempTextArea = document.createElement('textarea');
        tempTextArea.value = dataStr;
        document.body.appendChild(tempTextArea);
        tempTextArea.select();
        document.execCommand('copy');
        document.body.removeChild(tempTextArea);
        alert("📋 All data copied to clipboard!\nすべてのデータがクリップボードにコピーされました！");
    }

    function importData() {
        const input = prompt("📥 Please paste the data code (JSON String):\nデータを貼り付けてください:");
        if (input) {
            try {
                const parsed = JSON.parse(input);
                if (typeof parsed === 'object') {
                    recordData = parsed;
                    localStorage.setItem('igk_records_v2', JSON.stringify(recordData));
                    renderSummaryTable();
                    updateCharts();
                    alert("✨ Data imported successfully!\nデータのインポートが成功しました！");
                } else {
                    alert("⚠️ Invalid data format.\n無効なデータ形式です。");
                }
            } catch (e) {
                alert("⚠️ Parsing error.\nデータの解析に失敗しました。");
            }
        }
    }

    window.onclick = function(event) {
        const modal = document.getElementById('dataModal');
        if (event.target == modal) {
            modal.style.display = 'none';
        }
    }

    // Initialize Page
    updateLastWeekDays();
    renderSummaryTable();
    updateCharts();
</script>

</body>
</html>
