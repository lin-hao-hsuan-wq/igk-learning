<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGK 5-Day Record System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-print { background-color: #2ecc71; color: white; }
        .btn-print:hover { background-color: #27ae60; }
        
        .btn-sync { background-color: #f39c12; color: white; }
        .btn-sync:hover { background-color: #d35400; }

        .logo {
            text-align: center;
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--primary-color);
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-color);
            margin: 35px 0 15px 0;
        }
        h2 span {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 5px;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            background: #f1f5f9;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 8px;
            display: block;
        }
        label span {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
        }

        select, input, button {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background-color: white;
            box-sizing: border-box;
        }

        button.btn-save {
            background-color: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 700;
            margin-top: 20px;
            height: 48px;
        }
        button.btn-save:hover { background-color: #2980b9; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th, td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f8fafc;
            color: var(--primary-color);
            font-weight: 600;
            font-size: 14px;
        }
        th span {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .btn-action {
            padding: 6px 12px;
            background-color: #e2e8f0;
            color: var(--primary-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        .btn-action:hover { background-color: #cbd5e1; }

        .charts-wrapper {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .chart-box {
            flex: 1;
            min-width: 450px;
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            box-sizing: border-box;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .chart-title { font-weight: 700; color: var(--primary-color); font-size: 16px; }
        .chart-title span { display: block; font-size: 11px; color: var(--text-muted); font-weight: 400; }
        .chart-container { height: 280px; width: 100%; position: relative; }

        .motivation-box {
            margin-top: 40px;
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 12px;
        }

        .motivation-en { font-size: 18px; font-weight: 700; color: var(--primary-color); font-style: italic; margin-bottom: 10px; }
        .motivation-jp { font-size: 15px; color: var(--text-muted); }

        /* ================= 🛑 Custom Modal for Data Management ================= */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .modal-title { font-weight: 700; font-size: 18px; color: var(--primary-color); }
        .close-modal { font-size: 24px; cursor: pointer; color: var(--text-muted); }
        .close-modal:hover { color: black; }
        .detail-list { max-height: 300px; overflow-y: auto; margin-bottom: 15px; }
        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #f1f5f9;
        }
        .btn-delete {
            background-color: #ff7675;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-delete:hover { background-color: #d63031; }

        /* ================= 🖨️ A4 Print Styles ================= */
        @media print {
            @page { size: A4 portrait; margin: 1.5cm; }
            body { background: white !important; color: #000 !important; padding: 0 !important; }
            .container { box-shadow: none !important; padding: 0 !important; max-width: 100% !important; }
            .top-bar, h2:nth-of-type(1), .form-group, .btn-action { display: none !important; }
            th { background-color: #f1f5f9 !important; color: #000 !important; }
            td, th { border: 1px solid #cbd5e1 !important; padding: 10px !important; }
            .charts-wrapper { display: flex !important; flex-direction: row !important; gap: 15px !important; flex-wrap: nowrap !important; }
            .chart-box { flex: 1 !important; min-width: 0 !important; border: 1px solid #cbd5e1 !important; padding: 10px !important; }
            #chartUserSelect { display: none !important; }
            .motivation-box { background: #f8fafc !important; border: 1px solid #e2e8f0 !important; margin-top: 30px !important; padding: 15px !important; }
            .modal { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div>
            <label style="display:inline-block; margin-right: 10px; margin-bottom:0;">Target Month <span>対象月</span></label>
            <select id="monthSelect" onchange="handleMonthChange()" style="width: 160px; display:inline-block; padding: 6px; font-size: 14px;"></select>
        </div>
        <div class="btn-group">
            <button class="btn btn-sync" onclick="exportData()">📤 Export Data</button>
            <button class="btn btn-sync" onclick="importData()">📥 Import Data</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ Print / PDF</button>
        </div>
    </div>

    <div class="logo">IGK</div>

    <h2>📊 Daily Data Entry <span>毎日のデータ入力</span></h2>
    <div class="form-group">
        <div>
            <label>Member Name <span>メンバー名</span></label>
            <select id="userSelect"></select>
        </div>
        <div>
            <label>Record Date <span>記録日 (最終週)</span></label>
            <select id="dateSelect"></select>
        </div>
        <div>
            <label>Correct Answers (0-20) <span>正解数 (0-20題)</span></label>
            <input type="number" id="scoreInput" min="0" max="20" value="0">
        </div>
        <div>
            <button class="btn-save" onclick="saveData()">Save Record<br><span style="font-size:10px; font-weight:400; display:block; margin-top:-2px;">データを保存</span></button>
        </div>
    </div>

    <h2>📋 Weekly Overview <span>今週のデータ概要</span></h2>
    <table id="dailySummaryTable">
        <thead>
            <tr>
                <th>Date <span>日付</span></th>
                <th>Total Participants <span>参加人数</span></th>
                <th>Highest Score (Max 20) <span>最高得点 (20題中)</span></th>
                <th>Action <span>操作</span></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="charts-wrapper">
        <div class="chart-box">
            <div class="chart-header">
                <div class="chart-title">📊 Overall Team Progress <span>全体平均の推移</span></div>
            </div>
            <div class="chart-container">
                <canvas id="overallChart"></canvas>
            </div>
        </div>

        <div class="chart-box">
            <div class="chart-header">
                <div class="chart-title">👤 Individual Performance <span>個人スコアの傾向</span></div>
                <select id="chartUserSelect" onchange="updateCharts()" style="width: 120px; padding: 5px; font-size: 13px;"></select>
            </div>
            <div class="chart-container">
                <canvas id="personalChart"></canvas>
            </div>
        </div>
    </div>

    <div class="motivation-box">
        <div class="motivation-en">"Consistency is the key to mastery."</div>
        <div class="motivation-jp">「継続こそが、卓越した技術への唯一の道です。」</div>
    </div>
</div>

<div id="dataModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">Manage Data</div>
            <span class="close-modal" onclick="closeModal()">&times;</span>
        </div>
        <div class="detail-list" id="modalList"></div>
        <button onclick="closeModal()" style="background-color: var(--primary-color); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold;">Close / 閉じる</button>
    </div>
</div>

<script>
    // 1. Members List
    const rawUsers = [
        "Soma", "Kosei", "Minato", "Sumire", "Ayata", "Rito", "Kanata", 
        "Taishin", "Hina", "Soichi", "Tamaki", "Yushi", "Sohjiroh", 
        "Risa", "Ukyo", "Takumi", "Shiori", "Koharu", "Takuto", "Aqeel", "Ryuya"
    ];
    const users = rawUsers.sort((a, b) => a.localeCompare(b));

    const userSelect = document.getElementById('userSelect');
    const chartUserSelect = document.getElementById('chartUserSelect');
    
    users.forEach(user => {
        userSelect.add(new Option(user, user));
        chartUserSelect.add(new Option(user, user));
    });

    // 2. Month Selector Setup
    const monthSelect = document.getElementById('monthSelect');
    function initMonthSelector() {
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth(); 

        for(let i = -5; i <= 6; i++) {
            let d = new Date(currentYear, currentMonth + i, 1);
            let y = d.getFullYear();
            let m = String(d.getMonth() + 1).padStart(2, '0');
            let val = `${y}-${m}`;
            let text = `${y}年 ${m}月`;
            let option = new Option(text, val);
            if(i === 0) option.selected = true;
            monthSelect.add(option);
        }
    }
    initMonthSelector();

    // 3. Automatically Calculate Last Week
    let lastWeekDates = [];
    function updateLastWeekDays() {
        const [yearStr, monthStr] = monthSelect.value.split('-');
        const year = parseInt(yearStr);
        const month = parseInt(monthStr) - 1; 
        
        const lastDayOfMonth = new Date(year, month + 1, 0);
        const lastDate = lastDayOfMonth.getDate();
        const lastDayOfWeek = lastDayOfMonth.getDay(); 
        
        let lastFriday;
        if (lastDayOfWeek >= 5) {
            lastFriday = new Date(year, month, lastDate - (lastDayOfWeek - 5));
        } else {
            lastFriday = new Date(year, month, lastDate - (lastDayOfWeek + 2));
        }
        
        lastWeekDates = [];
        for (let i = 4; i >= 0; i--) {
            let d = new Date(lastFriday);
            d.setDate(lastFriday.getDate() - i);
            lastWeekDates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
        }

        const dateSelect = document.getElementById('dateSelect');
        dateSelect.innerHTML = '';
        lastWeekDates.forEach(date => dateSelect.add(new Option(date, date)));
    }

    function handleMonthChange() {
        updateLastWeekDays();
        renderSummaryTable();
        updateCharts();
    }

    // 4. Data Management
    let recordData = JSON.parse(localStorage.getItem('igk_records_v2')) || {};

    function saveData() {
        const user = userSelect.value;
        const date = dateSelect.value;
        const score = parseInt(document.getElementById('scoreInput').value);
        const selectedMonth = monthSelect.value;

        if (score < 0 || score > 20 || isNaN(score)) {
            alert("⚠️ Please enter a score between 0 and 20.\n0から20の間の数値を入力してください。");
            return;
        }

        if (!recordData[selectedMonth]) recordData[selectedMonth] = {};
        if (!recordData[selectedMonth][user]) recordData[selectedMonth][user] = {};
        
        recordData[selectedMonth][user][date] = score;
        localStorage.setItem('igk_records_v2', JSON.stringify(recordData));
        
        renderSummaryTable();
        updateCharts();
        alert(`✅ Record saved successfully for ${user}!\n${user}のデータが正常に保存されました！`);
    }

    function renderSummaryTable() {
        const tbody = document.getElementById('dailySummaryTable').querySelector('tbody');
        tbody.innerHTML = '';
        const selectedMonth = monthSelect.value;
        const monthData = recordData[selectedMonth] || {};

        lastWeekDates.forEach(date => {
            let count = 0, max = 0, hasData = false;
            for (let u in monthData) {
                if (monthData[u][date] !== undefined) {
                    count++;
                    hasData = true;
                    if (monthData[u][date] > max) max = monthData[u][date];
                }
            }
            tbody.innerHTML += `
                <tr>
                    <td>${date}</td>
                    <td>${count} Ppl / 人</td>
                    <td>${hasData ? max + ' Qs / 題' : '-'}</td>
                    <td><button class="btn-action" onclick="openManageModal('${date}')">🔍 View / Edit</button></td>
                </tr>`;
        });
    }

    // Delete Feature Logic
    function openManageModal(date) {
        const selectedMonth = monthSelect.value;
        const monthData = recordData[selectedMonth] || {};
        
        document.getElementById('modalTitle').innerText = `📅 Manage Data: ${date}`;
        const listContainer = document.getElementById('modalList');
        listContainer.innerHTML = '';

        let hasData = false;
        for (let user in monthData) {
            if (monthData[user][date] !== undefined) {
                hasData = true;
                const score = monthData[user][date];
                listContainer.innerHTML += `
                    <div class="detail-item">
                        <span><strong>${user}</strong>: ${score} Qs / 題</span>
                        <button class="btn-delete" onclick="deleteSingleRecord('${selectedMonth}', '${user}', '${date}')">🗑️ Delete</button>
                    </div>`;
            }
        }

        if (!hasData) {
            listContainer.innerHTML = '<p style="text-align:center; color:var(--text-muted);">No records found for this day.<br>この日のデータはありません。</p>';
        }

        document.getElementById('dataModal').style.display = 'flex';
    }

    function deleteSingleRecord(month, user, date) {
        if (confirm(`Are you sure you want to delete the record for ${user} on ${date}?\n${user}（${date}）のデータを削除してもよろしいですか？`)) {
            if (recordData[month] && recordData[month][user]) {
                delete recordData[month][user][date];
                
                if (Object.keys(recordData[month][user]).length === 0) {
                    delete recordData[month][user];
                }
                
                localStorage.setItem('igk_records_v2', JSON.stringify(recordData));
                
                renderSummaryTable();
                updateCharts();
                openManageModal(date); 
            }
        }
    }

    function closeModal() {
        document.getElementById('dataModal').style.display = 'none';
    }

    // 5. Chart Configurations
    let overallChart, personalChart;

    function updateCharts() {
        const selectedMonth = monthSelect.value;
        const monthData = recordData[selectedMonth] || {};

        const avgScores = lastWeekDates.map(date => {
            let total = 0, count = 0;
            for (let u in monthData) {
                if (monthData[u][date] !== undefined) {
                    total += monthData[u][date];
                    count++;
                }
            }
            return count > 0 ? (total / count).toFixed(1) : null;
        });

        const currentUser = chartUserSelect.value;
        const userScores = lastWeekDates.map(date => 
            (monthData[currentUser] && monthData[currentUser][date] !== undefined) ? monthData[currentUser][date] : null
        );

        const ctxOverall = document.getElementById('overallChart').getContext('2d');
        const ctxPersonal = document.getElementById('personalChart').getContext('2d');

        if (overallChart) overallChart.destroy();
        if (personalChart) personalChart.destroy();

        overallChart = new Chart(ctxOverall, {
            type: 'bar',
            data: {
                labels: lastWeekDates.map(d => d.slice(5)), 
                datasets: [{
                    label: 'Team Avg / 全體平均',
                    data: avgScores,
                    backgroundColor: 'rgba(52, 152, 219, 0.4)',
                    borderColor: '#3498db',
                    borderWidth: 1
                }]
            },
            options: chartOptions(20, 'Avg Score / 平均正解数')
        });

        personalChart = new Chart(ctxPersonal, {
            type: 'line',
            data: {
                labels: lastWeekDates.map(d => d.slice(5)),
                datasets: [{
                    label: `${currentUser}'s Score / スコア`,
                    data: userScores,
                    borderColor: '#2c3e50',
                    borderWidth: 3,
                    pointRadius: 5,
                    fill: false,
                    tension: 0.3
                }]
            },
            options: chartOptions(20, 'Score / 正解数')
        });
    }

    function chartOptions(max, yLabel) {
        return {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { min: 0, max: max, ticks: { stepSize: 2 }, title: { display: true, text: yLabel, font: { size: 11 } } }
            },
            plugins: { legend: { display: false } }
        };
    }

    // 6. Emergency Data Sync
    function exportData() {
        const dataStr = JSON.stringify(recordData);
        const tempTextArea = document.createElement('textarea');
        tempTextArea.value = dataStr;
        document.body.appendChild(tempTextArea);
        tempTextArea.select();
        document.execCommand('copy');
        document.body.removeChild(tempTextArea);
        alert("📋 All data copied to clipboard!\nすべてのデータがクリップボードにコピーされました！");
    }

    function importData() {
        const input = prompt("📥 Please paste the data code (JSON String):\nデータを貼り付けてください:");
        if (input) {
            try {
                const parsed = JSON.parse(input);
                if (typeof parsed === 'object') {
                    recordData = parsed;
                    localStorage.setItem('igk_records_v2', JSON.stringify(recordData));
                    renderSummaryTable();
                    updateCharts();
                    alert("✨ Data imported successfully!\nデータのインポートが成功しました！");
                } else {
                    alert("⚠️ Invalid data format.\n無効なデータ形式です。");
                }
            } catch (e) {
                alert("⚠️ Parsing error.\nデータの解析に失敗しました。");
            }
        }
    }

    window.onclick = function(event) {
        const modal = document.getElementById('dataModal');
        if (event.target == modal) {
            modal.style.display = 'none';
        }
    }

    // Initialize Page
    updateLastWeekDays();
    renderSummaryTable();
    updateCharts();
</script>

</body>
</html>
