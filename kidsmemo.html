<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Record / 日常記録</title>
    <style>
        /* 基礎設定與手繪風背景 */
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Comic Sans MS', 'Meiryo', sans-serif;
            margin: 0;
            padding: 2vh 2vw;
            width: 100vw;
            height: 100vh; /* 強制適應螢幕高度 */
            overflow: hidden; /* 絕對禁止上下滾動 */
            color: #4a4a4a;
            background-color: #fdfaf6;
            background-image: 
                radial-gradient(#ffd3b6 2px, transparent 2px),
                radial-gradient(#ffaaa5 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 密碼登入區 */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
            border: 3px dashed #ffaaa5;
            width: 90%;
            max-width: 400px;
        }
        .login-box h2 {
            color: #d9736c;
            margin-top: 0;
            border: none;
            padding: 0;
        }
        .login-box input {
            padding: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            width: 100%;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            text-align: center;
        }
        .login-box input:focus { border-color: #ffaaa5; }

        /* 主網頁區域 (滿版不滾動設計) */
        #main-app {
            display: none; /* 透過 JS 改為 flex */
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            height: 100%; /* 填滿 body */
            background: rgba(255, 255, 255, 0.92);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 2px solid #f8e1df;
        }

        h2 {
            color: #d9736c;
            text-align: center;
            font-size: 24px;
            margin: 0 0 20px 0;
            border-bottom: 3px dotted #ffaaa5;
            padding-bottom: 15px;
            flex-shrink: 0; /* 防止標題被壓縮 */
        }

        /* 頂部控制區 */
        .top-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        select, input[type="date"] {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            background-color: #fafafa;
        }
        select:focus, input[type="date"]:focus { border-color: #ffaaa5; }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-left: auto; /* 將按鈕群組推到最右邊 */
        }

        .history-btn {
            background-color: #ffe082;
            color: #6d4c41;
            box-shadow: 0 4px 6px rgba(255, 224, 130, 0.4);
        }
        .history-btn:hover { background-color: #ffd54f; }

        .student-btn {
            background-color: #b2dfdb;
            color: #004d40;
            box-shadow: 0 4px 6px rgba(178, 223, 219, 0.4);
        }
        .student-btn:hover { background-color: #80cbc4; }

        /* 下方左右輸入區 (自動延展) */
        .content-area {
            display: flex;
            gap: 30px;
            flex-grow: 1; /* 佔滿剩餘高度 */
            overflow: hidden;
        }
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .column label {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 18px;
            color: #6d9fa2;
            flex-shrink: 0;
        }
        textarea {
            flex-grow: 1; /* 輸入框自動拉伸填滿高度 */
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            resize: none; /* 禁止手動拉伸，維持版面 */
            box-sizing: border-box;
            line-height: 1.6;
            background-color: #fafafa;
            outline: none;
        }
        textarea:focus { border-color: #a8d8ea; }

        /* 按鈕基礎樣式 */
        button {
            padding: 12px 24px;
            background-color: #ffaaa5;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(255, 170, 165, 0.3);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 10px rgba(255, 170, 165, 0.4); }
        
        .save-btn { 
            margin-top: 20px; 
            width: 100%; 
            background-color: #a8d8ea; 
            color: #4a4a4a;
            box-shadow: 0 4px 6px rgba(168, 216, 234, 0.4);
            flex-shrink: 0;
        }
        .save-btn:hover { background-color: #8ccce2; }

        /* 彈出視窗 (Modal) 樣式 */
        .modal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            border: 3px dashed #a8d8ea;
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            color: #aaa;
            cursor: pointer;
            font-weight: bold;
        }
        .close-btn:hover { color: #d9736c; }

        /* 行事曆樣式 */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .calendar-header h3 { margin: 0; color: #6d9fa2; font-size: 22px; }
        .calendar-header button { padding: 8px 16px; font-size: 14px; background-color: #e0e0e0; color: #333; box-shadow: none; }
        .calendar-header button:hover { background-color: #ccc; }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            color: #d9736c;
            margin-bottom: 10px;
        }
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }
        .day-cell {
            aspect-ratio: 1; /* 保持正方形 */
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
        }
        .day-empty { background-color: transparent; }
        .day-no-record { background-color: #f0f0f0; color: #a0a0a0; }
        .day-has-record { 
            background-color: #ffaaa5; 
            color: white; 
            cursor: pointer; 
            box-shadow: 0 4px 6px rgba(255, 170, 165, 0.4); 
            transition: transform 0.2s;
        }
        .day-has-record:hover { transform: scale(1.1); background-color: #ff8c85; }

        /* 紀錄詳情與學生歷程樣式 */
        .records-list {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 10px;
        }
        .record-card {
            background: #fafafa;
            border-left: 6px solid #a8d8ea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-top: 1px solid #eee;
            border-right: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }
        .record-name { font-weight: bold; color: #d9736c; margin-bottom: 10px; font-size: 1.1em; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        /* 學生個人歷程特製標題 */
        .record-date-tag { font-weight: bold; color: #e57373; margin-bottom: 10px; font-size: 1.1em; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        .record-detail { margin-bottom: 8px; }
        .record-detail span { font-weight: bold; color: #6d9fa2; }
    </style>
</head>

<script>
    // ⚠️ 請在下方雙引號內填入您的 Google Apps Script 網頁應用程式 URL
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyi5CfdkrgiufwUGpFvCxl9NJHudL8s0joB08qEs7HB6ufRY5TTcXldIjfslM-V20ybMQ/exec";

    // 全域變數，用來快取從雲端下載下來的資料
    let globalCloudRecords = [];

    // Set today's date natively
    document.getElementById('record-date').valueAsDate = new Date();

    // Login Logic
    function checkPassword() {
        const pwd = document.getElementById('password-input').value;
        if (pwd === '0004') { 
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex'; // Use flex for layout
            preloadCloudData();
        } else {
            alert('Password Incorrect! / パスワードが間違っています！');
        }
    }
    document.getElementById('password-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkPassword();
    });

    // 格式化日期函數：確保所有日期不論帶有時間與否，一律變成 YYYY-MM-DD
    function cleanDateStr(rawDate) {
        if (!rawDate) return "";
        // 如果帶有 T (如 2026-06-04T15:00:00.000Z)
        if (rawDate.includes("T")) {
            return rawDate.split("T")[0];
        }
        // 如果是其他標準格式，只取前 10 碼
        return rawDate.substring(0, 10);
    }

    // 背景預載雲端資料
    function preloadCloudData() {
        fetch(GOOGLE_SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            // 在儲存前，將每筆紀錄的日期先做標準化清洗
            globalCloudRecords = data.map(r => {
                r.date = cleanDateStr(r.date);
                return r;
            });
            console.log("雲端資料已預載並完成格式校正，共 " + data.length + " 筆。");
        })
        .catch(err => console.error("背景預載失敗:", err));
    }

    // 保存紀錄邏輯
    function saveRecord() {
        const name = document.getElementById('student-name').value;
        const date = document.getElementById('record-date').value;
        const eventDesc = document.getElementById('event-text').value.trim();
        const solutionDesc = document.getElementById('solution-text').value.trim();

        if (!name || !eventDesc || !solutionDesc) {
            alert('Please fill in all fields! / 全ての項目を入力してください！');
            return;
        }

        const saveBtn = document.getElementById('save-btn-el');
        saveBtn.disabled = true;
        saveBtn.innerText = '🔄 Saving... / 保存中...';

        const payload = {
            date: date,
            name: name,
            event: eventDesc,
            solution: solutionDesc
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert('Saved Successfully to Cloud! / 雲端保存成功！');
            document.getElementById('event-text').value = '';
            document.getElementById('solution-text').value = '';
            preloadCloudData();
        })
        .catch(error => {
            console.error("儲存失敗:", error);
            alert("儲存失敗，請檢查網路連線。");
        })
        .finally(() => {
            saveBtn.disabled = false;
            saveBtn.innerText = '💾 Save Record / 保存する';
        });
    }

    // --- 行事曆邏輯 ---
    let currentCalDate = new Date();

    function openCalendarModal() {
        const historyBtn = document.getElementById('history-btn-el');
        const originalText = historyBtn.innerText;
        historyBtn.innerText = "🔄 Loading... / 読み込み中...";
        historyBtn.disabled = true;

        fetch(GOOGLE_SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            globalCloudRecords = data.map(r => {
                r.date = cleanDateStr(r.date);
                return r;
            });
            document.getElementById('calendar-modal').style.display = 'flex';
            renderCalendar();
        })
        .catch(err => {
            console.error("無法同步雲端行事曆:", err);
            alert("載入雲端資料失敗，將使用暫存資料顯示。");
            document.getElementById('calendar-modal').style.display = 'flex';
            renderCalendar();
        })
        .finally(() => {
            historyBtn.innerText = originalText;
            historyBtn.disabled = false;
        });
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    function changeMonth(step) {
        currentCalDate.setMonth(currentCalDate.getMonth() + step);
        renderCalendar();
    }

    function renderCalendar() {
        const year = currentCalDate.getFullYear();
        const month = currentCalDate.getMonth();
        
        document.getElementById('calendar-month-year').innerText = `${year} / ${String(month + 1).padStart(2, '0')}`;
        
        const firstDayIndex = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        const recordDates = globalCloudRecords.map(r => r.date);

        const daysGrid = document.getElementById('calendar-days');
        daysGrid.innerHTML = '';

        // Blank spots before first day
        for (let i = 0; i < firstDayIndex; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'day-cell day-empty';
            daysGrid.appendChild(emptyCell);
        }

        // Days of the month
        for (let i = 1; i <= daysInMonth; i++) {
            const cell = document.createElement('div');
            cell.innerText = i;
            
            const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            
            if (recordDates.includes(dateString)) {
                cell.className = 'day-cell day-has-record';
                cell.onclick = () => openDailyRecords(dateString, globalCloudRecords);
            } else {
                cell.className = 'day-cell day-no-record';
            }
            
            daysGrid.appendChild(cell);
        }
    }

    // Open specific date records
    function openDailyRecords(targetDate, allRecords) {
        const dailyRecords = allRecords.filter(r => r.date === targetDate);
        document.getElementById('records-date-title').innerText = `📅 ${targetDate} Records / 記録`;
        
        const listContainer = document.getElementById('records-list-container');
        listContainer.innerHTML = '';

        dailyRecords.forEach(record => {
            const card = document.createElement('div');
            card.className = 'record-card';
            
            const eventContent = record.eventDesc || record.event || "";
            const solutionContent = record.solutionDesc || record.solution || "";

            card.innerHTML = `
                <div class="record-name">👤 ${record.name}</div>
                <div class="record-detail"><span>📝 Event / 出来事:</span><br>${eventContent.replace(/\n/g, '<br>')}</div>
                <div class="record-detail"><span>💡 Solution / 解決策:</span><br>${solutionContent.replace(/\n/g, '<br>')}</div>
            `;
            listContainer.appendChild(card);
        });

        document.getElementById('records-modal').style.display = 'flex';
    }

    // --- 【新功能】依小孩查看的邏輯 ---
    function openStudentModal() {
        const studentBtn = document.getElementById('student-btn-el');
        const originalText = studentBtn.innerText;
        studentBtn.innerText = "🔄 Loading... / 読み込み中...";
        studentBtn.disabled = true;

        // 開啟前先重新從雲端抓一次最新資料，確保最即時
        fetch(GOOGLE_SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            globalCloudRecords = data.map(r => {
                r.date = cleanDateStr(r.date);
                return r;
            });

            // 動態同步主畫面的學生名單下拉選單到 Modal 中
            const mainSelect = document.getElementById('student-name');
            const modalSelect = document.getElementById('modal-student-select');
            
            // 保留原本的第一個提示選項，其餘清空重新同步
            modalSelect.innerHTML = '<option value="" disabled selected>Select a student / 兒童を選択してください</option>';
            modalSelect.innerHTML += mainSelect.innerHTML.replace('Select Name / 名前を選択', '');

            // 顯示視窗
            document.getElementById('student-modal').style.display = 'flex';
        })
        .catch(err => {
            console.error("同步失敗:", err);
            alert("載入最新資料失敗，將使用暫存資料顯示。");
            document.getElementById('student-modal').style.display = 'flex';
        })
        .finally(() => {
            studentBtn.innerText = originalText;
            studentBtn.disabled = false;
        });
    }

    function searchStudentHistory() {
        const selectedStudent = document.getElementById('modal-student-select').value;
        const container = document.getElementById('student-records-container');
        container.innerHTML = '';

        if (!selectedStudent) return;

        // 核心過濾：從所有資料中，撈出名字和被選中學生完全相符的紀錄，並依照日期排序（新到舊）
        const studentRecords = globalCloudRecords
            .filter(r => r.name === selectedStudent)
            .sort((a, b) => new Date(b.date) - new Date(a.date));

        if (studentRecords.length === 0) {
            container.innerHTML = `<p style="color: #999; text-align: center; margin-top: 20px;">No records found for this student.<br>這個孩子目前沒有任何歷史異常紀錄。</p>`;
            return;
        }

        // 渲染該學生的歷史卡片
        studentRecords.forEach(record => {
            const card = document.createElement('div');
            card.className = 'record-card';
            
            const eventContent = record.eventDesc || record.event || "";
            const solutionContent = record.solutionDesc || record.solution || "";

            card.innerHTML = `
                <div class="record-date-tag">📅 ${record.date}</div>
                <div class="record-detail"><span>📝 Event / 出来事:</span><br>${eventContent.replace(/\n/g, '<br>')}</div>
                <div class="record-detail"><span>💡 Solution / 解決策:</span><br>${solutionContent.replace(/\n/g, '<br>')}</div>
            `;
            container.appendChild(card);
        });
    }
  </script>
</body>
