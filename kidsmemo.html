<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Record / 日常記録</title>
    <style>
        /* 基礎設定與手繪風背景 */
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Comic Sans MS', 'Meiryo', sans-serif;
            margin: 0;
            padding: 2vh 2vw;
            width: 100vw;
            height: 100vh; /* 強制適應螢幕高度 */
            overflow: hidden; /* 絕對禁止上下滾動 */
            color: #4a4a4a;
            background-color: #fdfaf6;
            background-image: 
                radial-gradient(#ffd3b6 2px, transparent 2px),
                radial-gradient(#ffaaa5 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 密碼登入區 */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
            border: 3px dashed #ffaaa5;
            width: 90%;
            max-width: 400px;
        }
        .login-box h2 {
            color: #d9736c;
            margin-top: 0;
            border: none;
            padding: 0;
        }
        .login-box input {
            padding: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            width: 100%;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            text-align: center;
        }
        .login-box input:focus { border-color: #ffaaa5; }

        /* 主網頁區域 (滿版不滾動設計) */
        #main-app {
            display: none; /* 透過 JS 改為 flex */
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            height: 100%; /* 填滿 body */
            background: rgba(255, 255, 255, 0.92);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 2px solid #f8e1df;
        }

        h2 {
            color: #d9736c;
            text-align: center;
            font-size: 24px;
            margin: 0 0 20px 0;
            border-bottom: 3px dotted #ffaaa5;
            padding-bottom: 15px;
            flex-shrink: 0; /* 防止標題被壓縮 */
        }

        /* 頂部控制區 */
        .top-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        select, input[type="date"] {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            background-color: #fafafa;
        }
        select:focus, input[type="date"]:focus { border-color: #ffaaa5; }

        .history-btn {
            background-color: #ffe082;
            color: #6d4c41;
            box-shadow: 0 4px 6px rgba(255, 224, 130, 0.4);
            margin-left: auto; /* 將歷史按鈕推到最右邊 */
        }
        .history-btn:hover { background-color: #ffd54f; }

        /* 下方左右輸入區 (自動延展) */
        .content-area {
            display: flex;
            gap: 30px;
            flex-grow: 1; /* 佔滿剩餘高度 */
            overflow: hidden;
        }
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .column label {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 18px;
            color: #6d9fa2;
            flex-shrink: 0;
        }
        textarea {
            flex-grow: 1; /* 輸入框自動拉伸填滿高度 */
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            resize: none; /* 禁止手動拉伸，維持版面 */
            box-sizing: border-box;
            line-height: 1.6;
            background-color: #fafafa;
            outline: none;
        }
        textarea:focus { border-color: #a8d8ea; }

        /* 按鈕基礎樣式 */
        button {
            padding: 12px 24px;
            background-color: #ffaaa5;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(255, 170, 165, 0.3);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 10px rgba(255, 170, 165, 0.4); }
        
        .save-btn { 
            margin-top: 20px; 
            width: 100%; 
            background-color: #a8d8ea; 
            color: #4a4a4a;
            box-shadow: 0 4px 6px rgba(168, 216, 234, 0.4);
            flex-shrink: 0;
        }
        .save-btn:hover { background-color: #8ccce2; }

        /* 彈出視窗 (Modal) 樣式 */
        .modal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            border: 3px dashed #a8d8ea;
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            color: #aaa;
            cursor: pointer;
            font-weight: bold;
        }
        .close-btn:hover { color: #d9736c; }

        /* 行事曆樣式 */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .calendar-header h3 { margin: 0; color: #6d9fa2; font-size: 22px; }
        .calendar-header button { padding: 8px 16px; font-size: 14px; background-color: #e0e0e0; color: #333; box-shadow: none; }
        .calendar-header button:hover { background-color: #ccc; }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            color: #d9736c;
            margin-bottom: 10px;
        }
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }
        .day-cell {
            aspect-ratio: 1; /* 保持正方形 */
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
        }
        .day-empty { background-color: transparent; }
        .day-no-record { background-color: #f0f0f0; color: #a0a0a0; }
        .day-has-record { 
            background-color: #ffaaa5; 
            color: white; 
            cursor: pointer; 
            box-shadow: 0 4px 6px rgba(255, 170, 165, 0.4); 
            transition: transform 0.2s;
        }
        .day-has-record:hover { transform: scale(1.1); background-color: #ff8c85; }

        /* 紀錄詳情樣式 */
        .records-list {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 10px;
        }
        .record-card {
            background: #fafafa;
            border-left: 6px solid #a8d8ea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-top: 1px solid #eee;
            border-right: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }
        .record-name { font-weight: bold; color: #d9736c; margin-bottom: 10px; font-size: 1.1em; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        .record-detail { margin-bottom: 8px; }
        .record-detail span { font-weight: bold; color: #6d9fa2; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>🧸 System Login <br> <span style="font-size: 16px;">システムログイン</span></h2>
            <p style="color:#777;">Password / パスワード</p>
            <input type="password" id="password-input" placeholder="****">
            <br>
            <button onclick="checkPassword()">Login / ログイン</button>
        </div>
    </div>

    <div id="main-app">
        <h2>🎨 Daily Record / 日常記録</h2>
        
        <div class="top-controls">
            <select id="student-name">
                <option value="" disabled selected>Select Name / 名前を選択</option>
                <optgroup label="G1">
                    <option value="石原 瑛茉 Emma Ishihara (G1)">石原 瑛茉 Emma Ishihara</option>
                    <option value="岩瀬 広真 Kouma Iwase (G1)">岩瀬 広真 Kouma Iwase</option>
                    <option value="鹿島 美咲 Misaki Kashima (G1)">鹿島 美咲 Misaki Kashima</option>
                    <option value="金多 紗歩 Saho Kaneta (G1)">金多 紗歩 Saho Kaneta</option>
                    <option value="川畑 遼真 Haruma Kawabata (G1)">川畑 遼真 Haruma Kawabata</option>
                    <option value="河村 泉 Izumi Kawamura (G1)">河村 泉 Izumi Kawamura</option>
                    <option value="栗本 理来 Riku Kurimoto (G1)">栗本 理来 Riku Kurimoto</option>
                    <option value="酒井 梓 Azusa Sakai (G1)">酒井 梓 Azusa Sakai</option>
                    <option value="重安 こころ Kokoro Shigeyasu (G1)">重安 こころ Kokoro Shigeyasu</option>
                    <option value="杉立 舷 Gen Sugitate (G1)">杉立 舷 Gen Sugitate</option>
                    <option value="世古 碧 Aoi Seko (G1)">世古 碧 Aoi Seko</option>
                    <option value="田中 愛梨 Airi Tanaka (G1)">田中 愛梨 Airi Tanaka</option>
                    <option value="津田 莉世 Rise Tsuda (G1)">津田 莉世 Rise Tsuda</option>
                    <option value="橋本 莉緒 Rio Hashimoto (G1)">橋本 莉緒 Rio Hashimoto</option>
                    <option value="福田 悠晴 Yusei Fukuda (G1)">福田 悠晴 Yusei Fukuda</option>
                    <option value="南 佳苗 Kanae Minami (G1)">南 佳苗 Kanae Minami</option>
                    <option value="藪内 香帆 Kaho Yabuuchi (G1)">藪内 香帆 Kaho Yabuuchi</option>
                    <option value="山本 夕緋 Yuuhi Yamamoto (G1)">山本 夕緋 Yuuhi Yamamoto</option>
                    <option value="吉本 希 Mare Yoshimoto (G1)">吉本 希 Mare Yoshimoto</option>
                    <option value="羅 周周 ZhouZhou Luo (G1)">羅 周周 ZhouZhou Luo</option>
                    <option value="李 詩悠 Shiyuu Lee (G1)">李 詩悠 Shiyuu Lee</option>
                    <option value="大仲 和真 Kazuma Onaka (G1)">大仲 和真 Kazuma Onaka</option>
                    <option value="網 徹真 Toma Ami (G1)">網 徹真 Toma Ami</option>
                    <option value="弓場 茉弥 Mahiro Yuba (G1)">弓場 茉弥 Mahiro Yuba</option>
                    <option value="慈 恵俊 Eshun Utsumi (G1)">慈 恵俊 Eshun Utsumi</option>
                </optgroup>
                <optgroup label="G2">
                    <option value="平瀬 想真 Soma Hirase (G2)">平瀬 想真 Soma Hirase</option>
                    <option value="山部 弘誠 Kosei Yamabe (G2)">山部 弘誠 Kosei Yamabe</option>
                    <option value="上田 湊斗 Minato Ueta (G2)">上田 湊斗 Minato Ueta</option>
                    <option value="有吉 純麗 Sumire Ariyoshi (G2)">有吉 純麗 Sumire Ariyoshi</option>
                    <option value="澤村 奏汰 Kanata Sawamura (G2)">澤村 奏汰 Kanata Sawamura</option>
                    <option value="橋本 珠季 Tamaki Hashimoto (G2)">橋本 珠季 Tamaki Hashimoto</option>
                    <option value="足立 英大 Ayata Adachi (G2)">足立 英大 Ayata Adachi</option>
                    <option value="坂井 緋夏 Hina Sakai (G2)">坂井 緋夏 Hina Sakai</option>
                    <option value="永田 創次郎 Sohjiroh Nagata (G2)">永田 創次郎 Sohjiroh Nagata</option>
                    <option value="藤原 匠 Takumi Fujiwara (G2)">藤原 匠 Takumi Fujiwara</option>
                    <option value="宮田 泰槙 Taishin Miyata (G2)">宮田 泰槙 Taishin Miyata</option>
                    <option value="糸賀 優士 Yushi Itoga (G2)">糸賀 優士 Yushi Itoga</option>
                    <option value="岩田 吏永 Rito Iwata (G2)">岩田 吏永 Rito Iwata</option>
                    <option value="田中 聡一 Soichi Tanaka (G2)">田中 聡一 Soichi Tanaka</option>
                    <option value="畑 凜采 Risa Hata (G2)">畑 凜采 Risa Hata</option>
                    <option value="山根 栞 Shiori Yamane (G2)">山根 栞 Shiori Yamane</option>
                    <option value="剱物 右京 Ukyo Kenmotsu (G2)">剱物 右京 Ukyo Kenmotsu</option>
                    <option value="玉置 小晴 Koharu Tamaki (G2)">玉置 小晴 Koharu Tamaki</option>
                </optgroup>
            </select>
            <input type="date" id="record-date">
            <button class="history-btn" onclick="openCalendarModal()">📅 History / 履歴</button>
        </div>

        <div class="content-area">
            <div class="column">
                <label for="event-text">📝 Event / 出来事</label>
                <textarea id="event-text" placeholder="Detail the event... / 出来事を詳しく記入してください..."></textarea>
            </div>
            <div class="column">
                <label for="solution-text">💡 Solution / 解決策</label>
                <textarea id="solution-text" placeholder="Record the solution... / 解決策を記入してください..."></textarea>
            </div>
        </div>

        <button class="save-btn" onclick="saveRecord()">💾 Save Record / 保存する</button>
    </div>

    <div id="calendar-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('calendar-modal')">&times;</span>
            <div class="calendar-header">
                <button onclick="changeMonth(-1)">&#9664; Prev</button>
                <h3 id="calendar-month-year"></h3>
                <button onclick="changeMonth(1)">Next &#9654;</button>
            </div>
            <div class="weekdays">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div class="days-grid" id="calendar-days"></div>
        </div>
    </div>

    <div id="records-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('records-modal')">&times;</span>
            <h3 style="color:#d9736c; border-bottom: 2px dashed #a8d8ea; padding-bottom: 10px;" id="records-date-title"></h3>
            <div class="records-list" id="records-list-container"></div>
        </div>
    </div>

    <script>
        // Set today's date natively
        document.getElementById('record-date').valueAsDate = new Date();

        // Login Logic
        function checkPassword() {
            const pwd = document.getElementById('password-input').value;
            if (pwd === '0004') { 
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex'; // Use flex for layout
            } else {
                alert('Password Incorrect! / パスワードが間違っています！');
            }
        }
        document.getElementById('password-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPassword();
        });

        // Save Record Logic
        function saveRecord() {
            const name = document.getElementById('student-name').value;
            const date = document.getElementById('record-date').value;
            const eventDesc = document.getElementById('event-text').value;
            const solutionDesc = document.getElementById('solution-text').value;

            if (!name || !eventDesc || !solutionDesc) {
                alert('Please fill in all fields! / 全ての項目を入力してください！');
                return;
            }

            const newRecord = { name, date, eventDesc, solutionDesc };
            let records = JSON.parse(localStorage.getItem('myChildRecords')) || [];
            records.unshift(newRecord); 
            localStorage.setItem('myChildRecords', JSON.stringify(records));

            alert('Saved Successfully! / 保存しました！');
            
            document.getElementById('event-text').value = '';
            document.getElementById('solution-text').value = '';
        }

        // --- Calendar Logic ---
        let currentCalDate = new Date();

        function openCalendarModal() {
            document.getElementById('calendar-modal').style.display = 'flex';
            renderCalendar();
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function changeMonth(step) {
            currentCalDate.setMonth(currentCalDate.getMonth() + step);
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentCalDate.getFullYear();
            const month = currentCalDate.getMonth();
            
            document.getElementById('calendar-month-year').innerText = `${year} / ${String(month + 1).padStart(2, '0')}`;
            
            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Get Dates with records
            const records = JSON.parse(localStorage.getItem('myChildRecords')) || [];
            const recordDates = records.map(r => r.date);

            const daysGrid = document.getElementById('calendar-days');
            daysGrid.innerHTML = '';

            // Blank spots before first day
            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell day-empty';
                daysGrid.appendChild(emptyCell);
            }

            // Days of the month
            for (let i = 1; i <= daysInMonth; i++) {
                const cell = document.createElement('div');
                cell.innerText = i;
                
                // Format date to match saving format (YYYY-MM-DD)
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                
                if (recordDates.includes(dateString)) {
                    cell.className = 'day-cell day-has-record';
                    cell.onclick = () => openDailyRecords(dateString, records);
                } else {
                    cell.className = 'day-cell day-no-record';
                }
                
                daysGrid.appendChild(cell);
            }
        }

        // Open specific date records
        function openDailyRecords(targetDate, allRecords) {
            const dailyRecords = allRecords.filter(r => r.date === targetDate);
            document.getElementById('records-date-title').innerText = `📅 ${targetDate} Records / 記録`;
            
            const listContainer = document.getElementById('records-list-container');
            listContainer.innerHTML = '';

            dailyRecords.forEach(record => {
                const card = document.createElement('div');
                card.className = 'record-card';
                card.innerHTML = `
                    <div class="record-name">👤 ${record.name}</div>
                    <div class="record-detail"><span>📝 Event / 出来事:</span><br>${record.eventDesc.replace(/\n/g, '<br>')}</div>
                    <div class="record-detail"><span>💡 Solution / 解決策:</span><br>${record.solutionDesc.replace(/\n/g, '<br>')}</div>
                `;
                listContainer.appendChild(card);
            });

            document.getElementById('records-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
