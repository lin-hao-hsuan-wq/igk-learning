<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japanese Vocabulary Challenge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f8fafc; }
    .hidden { display: none; }
  </style>
</head>
<body class="min-h-screen text-slate-800 font-sans">
  <nav class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-2">
        <div class="w-8 h-8 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center">
          <span class="text-lg font-bold">日</span>
        </div>
        <span class="text-xl font-bold text-slate-950">日文單字大挑戰</span>
      </div>
      <div class="flex space-x-2 bg-slate-100 p-1 rounded-lg">
        <button id="studentBtn" class="px-4 py-1.5 rounded-md text-sm font-medium bg-white text-indigo-600 shadow-sm">Student Quiz</button>
        <button id="teacherBtn" class="px-4 py-1.5 rounded-md text-sm font-medium text-slate-600 hover:text-slate-900">Teacher Dashboard</button>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto p-4 md:py-8">
    <section id="studentView" class="max-w-2xl mx-auto">
      <div id="studentStart" class="bg-white border border-slate-200 rounded-2xl p-8 text-center shadow-sm">
        <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
          <span class="text-2xl">👋</span>
        </div>
        <h2 class="text-2xl font-bold text-slate-900 mb-2">Ready for the challenge?</h2>
        <p class="text-slate-500 mb-6">Enter your name below to start the 20-item Japanese-to-English quiz!</p>
        <div class="max-w-xs mx-auto space-y-4">
          <input id="studentNameInput" type="text" placeholder="Enter your name (e.g. Mika)" class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center text-lg" />
          <button id="startQuizBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition-colors shadow-sm">Start Quiz</button>
        </div>
      </div>

      <div id="quizForm" class="hidden space-y-6"></div>
      <div id="quizResult" class="hidden bg-white border border-slate-200 rounded-2xl p-8 text-center shadow-sm"></div>
    </section>

    <section id="teacherView" class="hidden space-y-8">
      <div class="flex items-center space-x-2 border-b border-slate-200 pb-2">
        <div class="text-indigo-600 w-6 h-6 flex items-center justify-center">
          <span class="text-xl">📊</span>
        </div>
        <h2 class="text-xl font-bold text-slate-900">Teacher Performance Dashboard</h2>
      </div>

      <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
        <div class="flex items-center space-x-2 mb-6">
          <span class="text-slate-400">📈</span>
          <h3 class="text-base font-bold text-slate-800">Weekly trend analysis (Mon–Fri)</h3>
        </div>
        <div id="chartContainer" class="space-y-4"></div>
        <div class="flex justify-center space-x-6 text-xs font-medium mt-4">
          <div class="flex items-center space-x-1.5"><div class="w-3 h-3 bg-indigo-500 rounded-sm"></div><span class="text-slate-500">Total submissions</span></div>
          <div class="flex items-center space-x-1.5"><div class="w-3 h-3 bg-emerald-500 rounded-sm"></div><span class="text-slate-500">Average correct answers (out of 20)</span></div>
        </div>
      </div>

      <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
        <div class="p-6 border-b border-slate-100 flex items-center space-x-2">
          <span class="text-slate-400">📋</span>
          <h3 class="text-base font-bold text-slate-800">學生詳細作答紀錄</h3>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-slate-50 border-b border-slate-200 text-xs font-semibold text-slate-500 tracking-wider">
                <th class="p-4">Student</th>
                <th class="p-4">Day</th>
                <th class="p-4 text-emerald-600">Correct</th>
                <th class="p-4 text-rose-600">Wrong</th>
                <th class="p-4 text-slate-400">Date</th>
              </tr>
            </thead>
            <tbody id="recordsBody" class="divide-y divide-slate-100 text-sm"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script>
    const QUIZ_DATA = [
      { jp: "はる", en: "spring" }, { jp: "なつ", en: "summer" }, { jp: "あき", en: "fall" }, { jp: "fuyu", en: "winter" },
      { jp: "はれた", en: "sunny" }, { jp: "くもりの", en: "cloudy" }, { jp: "あめの", en: "rainy" }, { jp: "ゆきのふる", en: "snowy" },
      { jp: "かぜのつよい", en: "windy" }, { jp: "かぞく", en: "family" }, { jp: "おとうさん", en: "father" }, { jp: "おかあさん", en: "mother" },
      { jp: "おにいさん・おとうと", en: "brother" }, { jp: "おねえさん・いもうと", en: "sister" }, { jp: "おじいさん", en: "grandfather" },
      { jp: "おばあさん", en: "grandmother" }, { jp: "おとこのこ", en: "boy" }, { jp: "おんなのこ", en: "girl" },
      { jp: "ともだち", en: "friend" }, { jp: "みんな", en: "everyone" }
    ];

    const DAYS_OF_WEEK = ["星期一", "星期二", "星期三", "星期四", "星期五"];
    const records = [
      { id: 1, name: "小明", correct: 18, wrong: 2, day: "星期一", date: "2026-05-18" },
      { id: 2, name: "小華", correct: 15, wrong: 5, day: "星期一", date: "2026-05-18" },
      { id: 3, name: "小紅", correct: 20, wrong: 0, day: "星期二", date: "2026-05-19" },
      { id: 4, name: "小強", correct: 12, wrong: 8, day: "星期三", date: "2026-05-20" }
    ];

    const studentBtn = document.getElementById('studentBtn');
    const teacherBtn = document.getElementById('teacherBtn');
    const studentView = document.getElementById('studentView');
    const teacherView = document.getElementById('teacherView');
    const studentStart = document.getElementById('studentStart');
    const quizForm = document.getElementById('quizForm');
    const quizResult = document.getElementById('quizResult');
    const studentNameInput = document.getElementById('studentNameInput');
    const startQuizBtn = document.getElementById('startQuizBtn');
    const recordsBody = document.getElementById('recordsBody');
    const chartContainer = document.getElementById('chartContainer');

    let currentAnswers = Array(20).fill('');
    let studentName = '';

    function showView(view) {
      if (view === 'student') {
        studentView.classList.remove('hidden');
        teacherView.classList.add('hidden');
        studentBtn.classList.add('bg-white', 'text-indigo-600', 'shadow-sm');
        studentBtn.classList.remove('text-slate-600');
        teacherBtn.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm');
        teacherBtn.classList.add('text-slate-600');
      } else {
        studentView.classList.add('hidden');
        teacherView.classList.remove('hidden');
        teacherBtn.classList.add('bg-white', 'text-indigo-600', 'shadow-sm');
        teacherBtn.classList.remove('text-slate-600');
        studentBtn.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm');
        studentBtn.classList.add('text-slate-600');
        renderTeacherData();
      }
    }

    function renderQuizForm() {
      quizForm.innerHTML = '';
      const form = document.createElement('form');
      form.className = 'space-y-6';
      form.addEventListener('submit', handleQuizSubmit);

      const header = document.createElement('div');
      header.className = 'bg-indigo-50 border border-indigo-100 rounded-xl p-4 flex justify-between items-center';
      header.innerHTML = `<span class="font-semibold text-indigo-900">Hello, ${studentName}!</span><span class="text-xs bg-indigo-200 text-indigo-800 px-2 py-1 rounded font-bold">20 questions total</span>`;
      form.appendChild(header);

      const questions = document.createElement('div');
      questions.className = 'space-y-4';

      QUIZ_DATA.forEach((q, idx) => {
        const item = document.createElement('div');
        item.className = 'bg-white border border-slate-200 rounded-xl p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3 shadow-xs';
        item.innerHTML = `
          <div class="flex items-center space-x-3">
            <span class="text-xs font-bold text-slate-400 w-5">${idx + 1}.</span>
            <span class="text-xl font-bold text-slate-900">${q.jp}</span>
          </div>
          <input type="text" placeholder="English answer" data-index="${idx}" class="quiz-input px-3 py-1.5 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 sm:w-64 font-mono" required />
        `;
        questions.appendChild(item);
      });

      const submitBtn = document.createElement('button');
      submitBtn.type = 'submit';
      submitBtn.className = 'w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-colors shadow-md text-lg';
      submitBtn.textContent = 'Finish!';

      form.appendChild(questions);
      form.appendChild(submitBtn);
      quizForm.appendChild(form);
      quizForm.classList.remove('hidden');
      studentStart.classList.add('hidden');
      quizResult.classList.add('hidden');

      document.querySelectorAll('.quiz-input').forEach(input => {
        input.addEventListener('input', (event) => {
          const index = Number(event.target.dataset.index);
          currentAnswers[index] = event.target.value;
        });
      });
    }

    function handleQuizSubmit(event) {
      event.preventDefault();
      if (!studentName.trim()) { alert('Please enter your name!'); return; }
      let correct = 0;
      QUIZ_DATA.forEach((q, idx) => {
        if (currentAnswers[idx].trim().toLowerCase() === q.en.toLowerCase()) correct += 1;
      });
      const wrong = 20 - correct;
      addRecord(correct, wrong);
      renderResult(correct, wrong);
    }

    function renderResult(correct, wrong) {
      quizResult.innerHTML = `
        <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">🎉</div>
        <h2 class="text-2xl font-bold text-slate-900 mb-1">Great job, ${studentName}!</h2>
        <p class="text-slate-500 mb-6">You've submitted your quiz successfully!</p>
        <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto mb-8">
          <div class="bg-emerald-50 border border-emerald-100 rounded-xl p-4">
            <div class="text-xs font-semibold text-emerald-700 uppercase tracking-wider">せいかい</div>
            <div class="text-3xl font-black text-emerald-600 mt-1">${correct} <span class="text-sm font-normal">questions</span></div>
          </div>
          <div class="bg-rose-50 border border-rose-100 rounded-xl p-4">
            <div class="text-xs font-semibold text-rose-700 uppercase tracking-wider">おしい</div>
            <div class="text-3xl font-black text-rose-600 mt-1">${wrong} <span class="text-sm font-normal">questions</span></div>
          </div>
        </div>
        <button id="retryBtn" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium px-6 py-2 rounded-lg transition-colors">Try again</button>
      `;
      quizResult.classList.remove('hidden');
      quizForm.classList.add('hidden');
      studentStart.classList.add('hidden');
      document.getElementById('retryBtn').addEventListener('click', resetQuiz);
    }

    function addRecord(correct, wrong) {
      const todayIndex = new Date().getDay();
      const dayName = DAYS_OF_WEEK[todayIndex - 1] || '星期一';
      records.unshift({ id: records.length + 1, name: studentName, correct, wrong, day: dayName, date: new Date().toLocaleDateString() });
      renderRecords();
    }

    function getChartData() {
      return DAYS_OF_WEEK.map(day => {
        const dayRecords = records.filter(r => r.day === day);
        const totalPeople = dayRecords.length;
        const avgScore = totalPeople ? Math.round(dayRecords.reduce((sum, r) => sum + r.correct, 0) / totalPeople) : 0;
        return { name: day, totalPeople, avgScore };
      });
    }

    function renderTeacherData() {
      renderRecords();
      chartContainer.innerHTML = '';
      getChartData().forEach(data => {
        const row = document.createElement('div');
        row.className = 'space-y-2';
        row.innerHTML = `
          <div class="flex justify-between text-sm text-slate-600"><span>${data.name}</span><span>${data.totalPeople} 人 / ${data.avgScore} 分</span></div>
          <div class="h-4 bg-slate-100 rounded-full overflow-hidden">
            <div class="h-full bg-indigo-500 rounded-full" style="width: ${Math.min(100, data.totalPeople * 20)}%"></div>
          </div>
        `;
        chartContainer.appendChild(row);
      });
    }

    function renderRecords() {
      recordsBody.innerHTML = '';
      if (!records.length) {
        recordsBody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-400">No quiz records yet.</td></tr>';
        return;
      }
      records.forEach(r => {
        const row = document.createElement('tr');
        row.className = 'hover:bg-slate-50/70 transition-colors';
        row.innerHTML = `
          <td class="p-4 font-medium text-slate-900">${r.name}</td>
          <td class="p-4"><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-800">${r.day}</span></td>
          <td class="p-4 font-bold text-emerald-600">${r.correct} / 20</td>
          <td class="p-4 font-medium text-rose-500">${r.wrong}</td>
          <td class="p-4 text-slate-400 text-xs">${r.date}</td>
        `;
        recordsBody.appendChild(row);
      });
    }

    function resetQuiz() {
      studentName = '';
      currentAnswers = Array(20).fill('');
      studentNameInput.value = '';
      studentStart.classList.remove('hidden');
      quizForm.classList.add('hidden');
      quizResult.classList.add('hidden');
    }

    startQuizBtn.addEventListener('click', () => {
      studentName = studentNameInput.value.trim();
      if (!studentName) { alert('Please enter your name first!'); return; }
      renderQuizForm();
    });

    studentBtn.addEventListener('click', () => showView('student'));
    teacherBtn.addEventListener('click', () => showView('teacher'));

    renderRecords();
    showView('student');
  </script>
</body>
</html>
